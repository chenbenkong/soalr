                            // 更新主材质为高质量材质
                            material = new THREE.MeshPhongMaterial({
                                map: earthTexture,
                                normalMap: normalTexture,
                                normalScale: new THREE.Vector2(0.85, 0.85),
                                specularMap: specularTexture,
                                specular: new THREE.Color(0x222222),
                                shininess: 25
                            });
                            mesh.material = material;

                            // 2. 添加云层
                            const cloudTexture = loader.load('https://cdn.jsdelivr.net/gh/mrdoob/three.js@dev/examples/textures/planets/earth_clouds_1024.png');
                            const cloudGeometry = new THREE.SphereGeometry(planet.radius * 1.02, 256, 256);
                            const cloudMaterial = new THREE.MeshPhongMaterial({
                                map: cloudTexture,
                                transparent: true,
                                opacity: 0.6,
                                depthWrite: false,
                                polygonOffset: true,
                                polygonOffsetFactor: -1,
                                polygonOffsetUnits: -1
                            });
                            const clouds = new THREE.Mesh(cloudGeometry, cloudMaterial);
                            mesh.add(clouds);

                            // 3. 添加白色大气层
                            const atmosphereGeometry = new THREE.SphereGeometry(planet.radius * 1.1, 128, 128);
                            const atmosphereMaterial = new THREE.ShaderMaterial({
                                uniforms: {
                                    'c': { value: 0.8 },
                                    'p': { value: 4.0 },
                                    'opacity': { value: 0.4 },
                                    'color': { value: new THREE.Color(0xffffff) }
                                },
                                vertexShader: `
                                    varying vec3 vNormal;
                                    void main() {
                                        vNormal = normalize(normalMatrix * normal);
                                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                                    }
                                `,
                                fragmentShader: `
                                    uniform float c;
                                    uniform float p;
                                    uniform float opacity;
                                    uniform vec3 color;
                                    varying vec3 vNormal;
                                    void main() {
                                        float intensity = pow(c - dot(vNormal, vec3(0.0, 0.0, 1.0)), p);
                                        gl_FragColor = vec4(color, intensity * opacity);
                                    }
                                `,
                                transparent: true,
                                side: THREE.BackSide
                            });

                            const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
                            mesh.add(atmosphere);

                            // 保存材质引用以便动画更新
                            planet.cloudMaterial = cloudMaterial;
                            planet.atmosphereMaterial = atmosphereMaterial;
                    } else if (planet.name === '天王星') {
                        // 高质量天王星模型实现
                        // 1. 创建天王星表面纹理
                        function createUranusTexture() {
                            const cvs = document.createElement('canvas');
                            const size = 1024;
                            cvs.width = size;
                            cvs.height = size / 2;
                            const ctx = cvs.getContext('2d');
                            
                            // 天王星基础色调 - 蓝绿色调
                            ctx.fillStyle = '#1e3a5f';
                            ctx.fillRect(0, 0, size, size / 2);
                            
                            // 绘制大气条纹
                            drawAtmosphericBands(ctx, size);
                            
                            // 绘制云特征
                            drawCloudFeatures(ctx, size);
                            
                            // 绘制极地区域
                            drawPolarRegions(ctx, size);
                            
                            return new THREE.CanvasTexture(cvs);
                        }
                        
                        // 绘制天王星大气条纹
                        function drawAtmosphericBands(ctx, size) {
                            // 绘制多个平行条纹带
                            for (let i = 0; i < 15; i++) {
                                const bandY = (i * size / 30) + (Math.random() * 10 - 5);
                                const bandHeight = 5 + Math.random() * 15;
                                const opacity = 0.15 + Math.random() * 0.2;
                                
                                // 创建条纹渐变
                                const gradient = ctx.createLinearGradient(0, bandY, 0, bandY + bandHeight);
                                gradient.addColorStop(0, `hsla(190, 70%, 60%, ${opacity * 0.3})`);
                                gradient.addColorStop(0.5, `hsla(200, 80%, 70%, ${opacity})`);
                                gradient.addColorStop(1, `hsla(190, 70%, 60%, ${opacity * 0.3})`);
                                
                                ctx.fillStyle = gradient;
                                ctx.fillRect(0, bandY, size, bandHeight);
                                
                                // 添加条纹中的云纹细节
                                for (let j = 0; j < 15; j++) {
                                    const x = Math.random() * size;
                                    const w = 30 + Math.random() * 80;
                                    const h = 3 + Math.random() * 8;
                                    const perturbY = bandY + (Math.random() * bandHeight) - h/2;
                                    
                                    ctx.fillStyle = `hsla(200, 90%, 80%, ${opacity * 0.7 + Math.random() * 0.3})`;
                                    ctx.fillRect(x, perturbY, w, h);
                                }
                            }
                        }
                        
                        // 绘制云特征
                        function drawCloudFeatures(ctx, size) {
                            // 随机分布的云团
                            for (let i = 0; i < 50; i++) {
                                const x = Math.random() * size;
                                const y = Math.random() * size / 2;
                                const w = 40 + Math.random() * 100;
                                const h = 10 + Math.random() * 30;
                                const opacity = 0.3 + Math.random() * 0.4;
                                
                                // 创建云团渐变
                                const gradient = ctx.createLinearGradient(x, y, x + w, y);
                                gradient.addColorStop(0, `hsla(180, 80%, 90%, 0)`);
                                gradient.addColorStop(0.5, `hsla(180, 90%, 95%, ${opacity})`);
                                gradient.addColorStop(1, `hsla(180, 80%, 90%, 0)`);
                                
                                ctx.fillStyle = gradient;
                                ctx.fillRect(x, y, w, h);
                            }
                            
                            // 较大的云系统
                            for (let i = 0; i < 8; i++) {
                                const x = Math.random() * size;
                                const y = Math.random() * size / 2;
                                const radius = 40 + Math.random() * 60;
                                const opacity = 0.2 + Math.random() * 0.3;
                                
                                // 创建圆形云系统
                                const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
                                gradient.addColorStop(0, `hsla(185, 90%, 95%, ${opacity})`);
                                gradient.addColorStop(0.7, `hsla(185, 80%, 90%, ${opacity * 0.5})`);
                                gradient.addColorStop(1, `hsla(185, 80%, 90%, 0)`);
                                
                                ctx.beginPath();
                                ctx.arc(x, y, radius, 0, Math.PI * 2);
                                ctx.fillStyle = gradient;
                                ctx.fill();
                            }
                        }
                        
                        // 绘制极地区域
                        function drawPolarRegions(ctx, size) {
                            const polarSize = size / 6;
                            
                            // 北极区域
                            const northGradient = ctx.createLinearGradient(0, 0, 0, polarSize);
                            northGradient.addColorStop(0, `hsla(210, 60%, 50%, 0.4)`);
                            northGradient.addColorStop(1, `hsla(210, 60%, 50%, 0)`);
                            
                            ctx.fillStyle = northGradient;
                            ctx.fillRect(0, 0, size, polarSize);
                            
                            // 南极区域
                            const southGradient = ctx.createLinearGradient(0, size/2 - polarSize, 0, size/2);
                            southGradient.addColorStop(0, `hsla(210, 60%, 50%, 0)`);
                            southGradient.addColorStop(1, `hsla(210, 60%, 50%, 0.4)`);
                            
                            ctx.fillStyle = southGradient;
                            ctx.fillRect(0, size/2 - polarSize, size, polarSize);
                        }
                        
                        // 2. 创建天王星凹凸贴图
                        function createUranusBumpMap() {
                            const cvs = document.createElement('canvas');
                            const size = 512;
                            cvs.width = size;
                            cvs.height = size / 2;
                            const ctx = cvs.getContext('2d');
                            
                            // 灰色基础
                            ctx.fillStyle = '#888';
                            ctx.fillRect(0, 0, size, size / 2);
                            
                            // 添加大气扰动效果
                            for (let i = 0; i < 2000; i++) {
                                const x = Math.random() * size;
                                const y = Math.random() * size / 2;
                                const r = 0.5 + Math.random() * 3;
                                
                                // 随机生成大气扰动的明暗区域
                                const value = 60 + Math.random() * 40;
                                ctx.fillStyle = `rgb(${value}, ${value}, ${value})`;
                                ctx.beginPath();
                                ctx.arc(x, y, r, 0, Math.PI * 2);
                                ctx.fill();
                            }
                            
                            // 添加云系统造成的凹凸效果
                            for (let i = 0; i < 30; i++) {
                                const x = Math.random() * size;
                                const y = Math.random() * size / 2;
                                const w = 20 + Math.random() * 60;
                                const h = 5 + Math.random() * 20;
                                
                                const gradient = ctx.createLinearGradient(x, y, x + w, y + h);
                                gradient.addColorStop(0, 'rgb(120, 120, 120)');
                                gradient.addColorStop(0.5, 'rgb(150, 150, 150)');
                                gradient.addColorStop(1, 'rgb(120, 120, 120)');
                                
                                ctx.fillStyle = gradient;
                                ctx.fillRect(x, y, w, h);
                            }
                            
                            return new THREE.CanvasTexture(cvs);
                        }
                        
                        // 3. 创建天王星环系统
                        function createUranusRings() {
                            const innerRadius = planet.radius * 1.8;
                            const outerRadius = planet.radius * 2.8;
                            const segments = 512;
                            
                            // 创建光环几何体
                            const ringGeometry = new THREE.RingGeometry(innerRadius, outerRadius, segments);
                            
                            // 创建光环纹理
                            const cvs = document.createElement('canvas');
                            const size = 1024;
                            cvs.width = size;
                            cvs.height = size / 2;
                            const ctx = cvs.getContext('2d');
                            
                            // 光环基础颜色
                            ctx.fillStyle = '#333344';
                            ctx.fillRect(0, 0, size, size / 2);
                            
                            // 添加光环中的亮区和暗区
                            for (let i = 0; i < 50; i++) {
                                const x = Math.random() * size;
                                const y = Math.random() * size / 2;
                                const w = 10 + Math.random() * 100;
                                const h = 1 + Math.random() * 3;
                                const opacity = 0.2 + Math.random() * 0.5;
                                
                                ctx.fillStyle = `hsla(220, 30%, 70%, ${opacity})`;
                                ctx.fillRect(x, y, w, h);
                            }
                            
                            // 创建光环材质
                            const ringMaterial = new THREE.MeshBasicMaterial({
                                map: new THREE.CanvasTexture(cvs),
                                side: THREE.DoubleSide,
                                transparent: true,
                                opacity: 0.6
                            });
                            
                            // 创建光环网格
                            const ring = new THREE.Mesh(ringGeometry, ringMaterial);
                            
                            // 设置光环倾斜角度（与天王星自转轴倾斜一致）
                            ring.rotation.x = Math.PI / 2;
                            ring.rotation.z = 1.5; // 天王星的极端倾斜角度
                            
                            return ring;
                        }
                        
                        // 4. 更新几何体和材质
                        // 创建高细分天王星几何体
                        const uranusGeometry = new THREE.SphereGeometry(planet.radius, 128, 64);
                        
                        // 创建高质量天王星材质
                        material = new THREE.MeshStandardMaterial({
                            map: createUranusTexture(),
                            bumpMap: createUranusBumpMap(),
                            bumpScale: 0.4,
                            roughness: 0.8,
                            metalness: 0.1,
                            shininess: 15,
                            reflectivity: 0.25
                        });
                        mesh.material = material;
                        
                        // 设置天王星自转轴倾斜
                        mesh.rotation.z = 1.5; // 天王星的极端倾斜角度
                        
                        // 5. 添加天王星环系统
                        if (planet.hasRings) {
                            const ring = createUranusRings();
                            mesh.add(ring);
                            planet.ring = ring;
                        }
                        
                        // 6. 添加天王星外层大气光晕
                        const atmosphereGeometry = new THREE.SphereGeometry(planet.radius * 1.05, 128, 64);
                        const atmosphereMaterial = new THREE.MeshBasicMaterial({
                            color: 0x4a7a9c,
                            transparent: true,
                            opacity: 0.15,
                            side: THREE.BackSide,
                            depthWrite: false,
                            polygonOffset: true,
                            polygonOffsetFactor: -2,
                            polygonOffsetUnits: -2
                        });
                        const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
                        mesh.add(atmosphere);
                        
                        // 保存材质引用以便动画更新
                        planet.atmosphereMaterial = atmosphereMaterial;

                    }

                    // 海王星高质量模型实现 - 基于haihaihai.html
                    if (planet.name === '海王星') {
                        // 1. 海王星专属纹理创建函数
                        function createNeptuneTexture() {
                            const cvs = document.createElement('canvas');
                            const size = 1024;
                            cvs.width = size;
                            cvs.height = size / 2;
                            const ctx = cvs.getContext('2d');
                            
                            // 海王星基础色调 - 深蓝色渐变
                            const baseGradient = ctx.createLinearGradient(0, 0, 0, size/2);
                            baseGradient.addColorStop(0, '#1a4b8c'); // 较浅的蓝色
                            baseGradient.addColorStop(1, '#0a2c5c'); // 深蓝色
                            ctx.fillStyle = baseGradient;
                            ctx.fillRect(0, 0, size, size / 2);
                            
                            // 添加更活跃的大气条纹
                            drawAtmosphericBands(ctx, size);
                            
                            // 添加明显的云特征和风暴
                            drawCloudFeatures(ctx, size);
                            
                            // 添加大暗斑（海王星特征）
                            drawGreatDarkSpot(ctx, size);
                            
                            // 添加极地区域
                            drawPolarRegions(ctx, size);
                            
                            return new THREE.CanvasTexture(cvs);
                        }

                        // 绘制海王星大气条纹
                        function drawAtmosphericBands(ctx, size) {
                            for (let i = 0; i < 10; i++) {
                                const yPos = (i / 9) * (size * 0.45) + size * 0.025;
                                const height = size * 0.04 + Math.random() * size * 0.06;
                                
                                const gradient = ctx.createLinearGradient(0, yPos, 0, yPos + height);
                                const brightness = 1.1 + (Math.random() * 0.15);
                                gradient.addColorStop(0, `rgba(26, 75, 140, ${0.4 * brightness})`);
                                gradient.addColorStop(0.5, `rgba(26, 75, 140, ${0.6 * brightness})`);
                                gradient.addColorStop(1, `rgba(26, 75, 140, ${0.4 * brightness})`);
                                
                                ctx.fillStyle = gradient;
                                ctx.fillRect(0, yPos, size, height);
                                
                                // 条纹中的扰动
                                for (let j = 0; j < 8; j++) {
                                    const x = Math.random() * size;
                                    const w = size * 0.1 + Math.random() * size * 0.25;
                                    const h = height * 0.4 + Math.random() * height * 0.5;
                                    const perturbY = yPos + (Math.random() * height) - h/2;
                                    
                                    ctx.fillStyle = `rgba(36, 95, 160, ${0.3 + Math.random() * 0.3})`;
                                    ctx.fillRect(x, perturbY, w, h);
                                }
                            }
                        }

                        // 绘制海王星的云特征
                        function drawCloudFeatures(ctx, size) {
                            // 亮白色云带
                            for (let i = 0; i < 20; i++) {
                                const x = Math.random() * size;
                                const y = Math.random() * size * 0.5;
                                const width = size * 0.06 + Math.random() * size * 0.25;
                                const height = size * 0.015 + Math.random() * size * 0.04;
                                
                                // 云的不规则形状
                                ctx.beginPath();
                                ctx.moveTo(x, y);
                                
                                // 上边缘波浪
                                for (let j = 0; j < width; j += 10) {
                                    const wave = Math.sin(j * 0.1 + i) * 4 + (Math.random() * 7 - 3.5);
                                    ctx.lineTo(x + j, y + wave);
                                }
                                
                                // 下边缘波浪
                                for (let j = width; j >= 0; j -= 10) {
                                    const wave = Math.sin(j * 0.1 + i + 1) * 3 + (Math.random() * 5 - 2.5) + height;
                                    ctx.lineTo(x + j, y + wave);
                                }
                                
                                ctx.closePath();
                                ctx.fillStyle = `rgba(220, 240, 255, ${0.15 + Math.random() * 0.2})`;
                                ctx.fill();
                            }
                            
                            // 小型云团
                            for (let i = 0; i < 40; i++) {
                                const x = Math.random() * size;
                                const y = Math.random() * size * 0.5;
                                const radius = size * 0.008 + Math.random() * size * 0.03;
                                
                                const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
                                gradient.addColorStop(0, 'rgba(220, 240, 255, 0.3)');
                                gradient.addColorStop(1, 'rgba(220, 240, 255, 0)');
                                
                                ctx.beginPath();
                                ctx.arc(x, y, radius, 0, Math.PI * 2);
                                ctx.fillStyle = gradient;
                                ctx.fill();
                            }
                        }

                        // 绘制海王星大暗斑
                        function drawGreatDarkSpot(ctx, size) {
                            const spotX = size * 0.3;
                            const spotY = size * 0.28;
                            const spotR = size * 0.12;
                            
                            // 大暗斑主体
                            ctx.beginPath();
                            ctx.ellipse(spotX, spotY, spotR, spotR * 0.8, 0.3, 0, Math.PI * 2);
                            
                            const spotGradient = ctx.createRadialGradient(spotX, spotY, 0, spotX, spotY, spotR);
                            spotGradient.addColorStop(0, 'rgba(10, 30, 60, 0.9)');
                            spotGradient.addColorStop(0.7, 'rgba(10, 30, 60, 0.7)');
                            spotGradient.addColorStop(1, 'rgba(10, 30, 60, 0.3)');
                            
                            ctx.fillStyle = spotGradient;
                            ctx.fill();
                            
                            // 暗斑周围的白色云带
                            const cloudBandY = spotY + spotR * 0.7;
                            ctx.beginPath();
                            ctx.moveTo(spotX - spotR * 1.2, cloudBandY);
                            
                            for (let x = spotX - spotR * 1.2; x < spotX + spotR * 1.2; x += 15) {
                                const wave = Math.sin((x - (spotX - spotR * 1.2)) * 0.03) * 10 + 
                                             (Math.random() * 8 - 4);
                                ctx.lineTo(x, cloudBandY + wave);
                            }
                            
                            ctx.lineTo(spotX + spotR * 1.2, cloudBandY);
                            ctx.lineTo(spotX + spotR * 1.2, cloudBandY + 20);
                            
                            for (let x = spotX + spotR * 1.2; x > spotX - spotR * 1.2; x -= 15) {
                                const wave = Math.sin(((spotX + spotR * 1.2) - x) * 0.03) * 8 + 
                                             (Math.random() * 6 - 3) + 15;
                                ctx.lineTo(x, cloudBandY + wave);
                            }
                            
                            ctx.closePath();
                            ctx.fillStyle = 'rgba(220, 240, 255, 0.25)';
                            ctx.fill();
                        }

                        // 绘制海王星极地区域
                        function drawPolarRegions(ctx, size) {
                            // 北极区域
                            const northRadius = size * 0.18;
                            const northGradient = ctx.createLinearGradient(0, 0, 0, northRadius * 1.5);
                            northGradient.addColorStop(0, 'rgba(15, 40, 80, 0.9)');
                            northGradient.addColorStop(1, 'transparent');
                            
                            ctx.beginPath();
                            ctx.ellipse(size * 0.5, 0, size * 0.5, northRadius, 0, 0, Math.PI * 2);
                            ctx.fillStyle = northGradient;
                            ctx.fill();
                            
                            // 北极附近的云带
                            drawPolarClouds(ctx, size, 0.05, 0.15);
                            
                            // 南极区域
                            const southRadius = size * 0.18;
                            const southGradient = ctx.createLinearGradient(0, size * 0.5 - southRadius * 1.5, 0, size * 0.5);
                            southGradient.addColorStop(0, 'transparent');
                            southGradient.addColorStop(1, 'rgba(15, 40, 80, 0.9)');
                            
                            ctx.beginPath();
                            ctx.ellipse(size * 0.5, size * 0.5, size * 0.5, southRadius, 0, 0, Math.PI * 2);
                            ctx.fillStyle = southGradient;
                            ctx.fill();
                            
                            // 南极附近的云带
                            drawPolarClouds(ctx, size, 0.85, 0.95);
                        }

                        // 绘制极地云带
                        function drawPolarClouds(ctx, size, minY, maxY) {
                            for (let i = 0; i < 5; i++) {
                                const x = Math.random() * size;
                                const y = minY * size * 0.5 + Math.random() * (maxY - minY) * size * 0.5;
                                const width = size * 0.3 + Math.random() * size * 0.4;
                                const height = size * 0.02 + Math.random() * size * 0.04;
                                
                                ctx.beginPath();
                                ctx.moveTo(x, y);
                                
                                for (let j = 0; j < width; j += 10) {
                                    const wave = Math.sin(j * 0.05 + i) * 5 + (Math.random() * 6 - 3);
                                    ctx.lineTo(x + j, y + wave);
                                }
                                
                                for (let j = width; j >= 0; j -= 10) {
                                    const wave = Math.sin(j * 0.05 + i + 1) * 3 + (Math.random() * 4 - 2) + height;
                                    ctx.lineTo(x + j, y + wave);
                                }
                                
                                ctx.closePath();
                                ctx.fillStyle = `rgba(200, 230, 255, ${0.12 + Math.random() * 0.18})`;
                                ctx.fill();
                            }
                        }

                        // 海王星大气凹凸贴图
                        function createNeptuneBumpMap() {
                            const cvs = document.createElement('canvas');
                            const size = 512;
                            cvs.width = size;
                            cvs.height = size / 2;
                            const ctx = cvs.getContext('2d');
                            
                            // 灰色基础
                            ctx.fillStyle = '#888';
                            ctx.fillRect(0, 0, size, size / 2);
                            
                            // 添加大气扰动
                            for (let i = 0; i < 1500; i++) {
                                const x = Math.random() * size;
                                const y = Math.random() * size / 2;
                                const r = 1 + Math.random() * 4;
                                
                                const value = 65 + Math.random() * 20;
                                ctx.fillStyle = `rgb(${value}, ${value}, ${value})`;
                                ctx.beginPath();
                                ctx.arc(x, y, r, 0, Math.PI * 2);
                                ctx.fill();
                            }
                            
                            // 添加大暗斑区域的高度变化
                            const spotX = size * 0.3;
                            const spotY = size * 0.28;
                            const spotR = size * 0.12;
                            
                            const spotGradient = ctx.createRadialGradient(spotX, spotY, 0, spotX, spotY, spotR);
                            spotGradient.addColorStop(0, '#555');
                            spotGradient.addColorStop(0.7, '#666');
                            spotGradient.addColorStop(1, '#888');
                            
                            ctx.beginPath();
                            ctx.ellipse(spotX, spotY, spotR, spotR * 0.8, 0.3, 0, Math.PI * 2);
                            ctx.fillStyle = spotGradient;
                            ctx.fill();
                            
                            // 添加云带的高度变化
                            for (let i = 0; i < 8; i++) {
                                const yPos = (i / 7) * (size * 0.4) + size * 0.05;
                                const height = size * 0.04;
                                
                                const gradient = ctx.createLinearGradient(0, yPos, 0, yPos + height);
                                gradient.addColorStop(0, 'rgb(55, 55, 55)');
                                gradient.addColorStop(0.5, 'rgb(85, 85, 85)');
                                gradient.addColorStop(1, 'rgb(55, 55, 55)');
                                
                                ctx.fillStyle = gradient;

                        // 绘制心形区域（史普尼克平原）

                            drawMoonSeas(ctx, size);
                             
                            // 绘制不同规模的撞击坑
                            drawLargeCraters(ctx, size);   // 大型撞击坑
                            drawMediumCraters(ctx, size); // 中型撞击坑
                            drawSmallCraters(ctx, size);  // 小型撞击坑
                             
                            // 添加月球表面细节纹理
                            addSurfaceDetails(ctx, size);
                             
                            return new THREE.CanvasTexture(cvs);
                        }

                        // 添加多层次月球噪声
                        function addLunarNoise(ctx, size, intensity, layers) {
                            const img = ctx.getImageData(0, 0, size, size/2);
                            const data = img.data;
                             
                            for (let layer = 0; layer < layers; layer++) {
                                const scale = 3 + layer * 4; // 不同层级的噪声比例
                                for (let y = 0; y < size/2; y += scale) {
                                    for (let x = 0; x < size; x += scale) {
                                        const index = (y * size + x) * 4;
                                        if (index >= data.length) continue;
                                         
                                        const noise = (Math.random() - 0.5) * 100 * intensity;
                                        data[index] = Math.min(255, Math.max(0, data[index] + noise));
                                        data[index+1] = data[index];
                                        data[index+2] = data[index];
                                    }
                                }
                            }
                             
                            ctx.putImageData(img, 0, 0);
                        }

                        // 绘制月海区域
                        function drawMoonSeas(ctx, size) {
                            // 月海形状生成函数
                            function drawSea(x, y, r, points, color) {
                                ctx.beginPath();
                                for (let i = 0; i < points; i++) {
                                    const angle = (i / points) * Math.PI * 2;
                                    const rad = r * (0.7 + Math.random() * 0.3);
                                    const px = x + Math.cos(angle) * rad;
                                    const py = y + Math.sin(angle) * rad;
                                    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
                                }
                                ctx.closePath();
                                 
                                // 月海内部细节
                                const seaGradient = ctx.createRadialGradient(x, y, 0, x, y, r);
                                seaGradient.addColorStop(0, color);
                                seaGradient.addColorStop(0.7, shadeColor(color, 5));
                                seaGradient.addColorStop(1, shadeColor(color, 15));
                                ctx.fillStyle = seaGradient;
                                ctx.fill();
                                 
                                // 月海表面添加轻微纹理
                                addSeaTexture(ctx, x, y, r);
                            }
                             
                            // 主要月海区域 - 不同深浅的灰色
                            drawSea(size*0.22, size*0.16, size*0.13, 10, '#c0c0c0');
                            drawSea(size*0.68, size*0.22, size*0.16, 12, '#bfbfbf');
                            drawSea(size*0.43, size*0.38, size*0.11, 9, '#c2c2c2');
                            drawSea(size*0.82, size*0.12, size*0.09, 7, '#c4c4c4');
                            drawSea(size*0.15, size*0.32, size*0.07, 6, '#c3c3c3');
                            drawSea(size*0.75, size*0.35, size*0.08, 6, '#c1c1c1');
                        }

                        // 月海表面纹理
                        function addSeaTexture(ctx, cx, cy, radius) {
                            for (let i = 0; i < 80; i++) {
                                const angle = Math.random() * Math.PI * 2;
                                const dist = Math.random() * radius * 0.8;
                                const x = cx + Math.cos(angle) * dist;
                                const y = cy + Math.sin(angle) * dist;
                                const size = 1 + Math.random() * 3;
                                 
                                ctx.beginPath();
                                ctx.arc(x, y, size, 0, Math.PI * 2);
                                ctx.fillStyle = Math.random() > 0.5 ? 'rgba(0,0,0,0.03)' : 'rgba(255,255,255,0.03)';
                                ctx.fill();
                            }
                        }

                        // 绘制大型撞击坑
                        function drawLargeCraters(ctx, size) {
                            const craters = [
                                {x: size*0.35, y: size*0.18, r: 25},
                                {x: size*0.7, y: size*0.3, r: 30},
                                {x: size*0.15, y: size*0.25, r: 20},
                                {x: size*0.5, y: size*0.1, r: 18},
                                {x: size*0.85, y: size*0.3, r: 22}
                            ];
                             
                            craters.forEach(crater => {
                                drawDetailedCrater(ctx, crater.x, crater.y, crater.r);
                            });
                        }

                        // 绘制中型撞击坑
                        function drawMediumCraters(ctx, size) {
                            for (let i = 0; i < 15; i++) {
                                const x = Math.random() * size;
                                const y = Math.random() * size * 0.5;
                                const r = 8 + Math.random() * 15;
                                 
                                // 避免在大型撞击坑中心重复绘制
                                let overlap = false;
                                if (Math.hypot(x - size*0.35, y - size*0.18) < 25) overlap = true;
                                if (Math.hypot(x - size*0.7, y - size*0.3) < 30) overlap = true;
                                 
                                if (!overlap) {
                                    drawSimpleCrater(ctx, x, y, r, Math.random() > 0.4);
                                }
                            }
                        }

                        // 绘制小型撞击坑
                        function drawSmallCraters(ctx, size) {
                            for (let i = 0; i < 100; i++) {
                                const x = Math.random() * size;
                                const y = Math.random() * size * 0.5;
                                const r = 2 + Math.random() * 6;
                                 
                                ctx.beginPath();
                                ctx.arc(x, y, r, 0, Math.PI * 2);
                                const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
                                grad.addColorStop(0, '#b8b8b8');
                                grad.addColorStop(0.7, '#a0a0a0');
                                grad.addColorStop(1, '#d0d0d0');
                                ctx.fillStyle = grad;
                                ctx.fill();
                            }
                        }

                        // 详细撞击坑绘制（带复杂结构）
                        function drawDetailedCrater(ctx, x, y, r) {
                            // 不规则坑边缘
                            ctx.beginPath();
                            for (let j = 0; j < 12; j++) {
                                const angle = (j / 12) * Math.PI * 2;
                                const rad = r * (0.8 + Math.random() * 0.25);
                                const px = x + Math.cos(angle) * rad;
                                const py = y + Math.sin(angle) * rad;
                                j === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
                            }
                            ctx.closePath();
                             
                            // 坑边缘阴影
                            const edgeGrad = ctx.createRadialGradient(x, y, 0, x, y, r);
                            edgeGrad.addColorStop(0, '#c5c5c5');
                            edgeGrad.addColorStop(0.5, '#a2a2a2');
                            edgeGrad.addColorStop(1, '#d0d0d0');
                            ctx.fillStyle = edgeGrad;
                            ctx.fill();
                             
                            // 坑底
                            const floorR = r * 0.75;
                            ctx.beginPath();
                            ctx.arc(x, y, floorR, 0, Math.PI * 2);
                            const floorGrad = ctx.createRadialGradient(x, y, 0, x, y, floorR);
                            floorGrad.addColorStop(0, '#d8d8d8');
                            floorGrad.addColorStop(1, '#c0c0c0');
                            ctx.fillStyle = floorGrad;
                            ctx.fill();
                             
                            // 中心峰
                            const peakR = r * 0.15;
                            ctx.beginPath();
                            ctx.arc(x, y, peakR, 0, Math.PI * 2);
                            const peakGrad = ctx.createRadialGradient(x, y, 0, x, y, peakR);
                            peakGrad.addColorStop(0, '#e0e0e0');
                            peakGrad.addColorStop(1, '#d0d0d0');
                            ctx.fillStyle = peakGrad;
                            ctx.fill();
                             
                            // 坑内次级小坑
                            for (let i = 0; i < 3; i++) {
                                const subR = r * (0.05 + Math.random() * 0.08);
                                const subX = x + (Math.random() - 0.5) * r * 0.5;
                                const subY = y + (Math.random() - 0.5) * r * 0.5;
                                 
                                ctx.beginPath();
                                ctx.arc(subX, subY, subR, 0, Math.PI * 2);
                                const subGrad = ctx.createRadialGradient(subX, subY, 0, subX, subY, subR);
                                subGrad.addColorStop(0, '#c8c8c8');
                                subGrad.addColorStop(1, '#b5b5b5');
                                ctx.fillStyle = subGrad;
                                ctx.fill();
                            }
                        }

                        // 简单撞击坑绘制
                        function drawSimpleCrater(ctx, x, y, r, hasPeak) {
                            // 不规则坑边缘
                            ctx.beginPath();
                            for (let j = 0; j < 8; j++) {
                                const angle = (j / 8) * Math.PI * 2;
                                const rad = r * (0.8 + Math.random() * 0.2);
                                const px = x + Math.cos(angle) * rad;
                                const py = y + Math.sin(angle) * rad;
                                j === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
                            }
                            ctx.closePath();
                             
                            // 坑边缘阴影
                            const edgeGrad = ctx.createRadialGradient(x, y, 0, x, y, r);
                            edgeGrad.addColorStop(0, '#c2c2c2');
                            edgeGrad.addColorStop(0.6, '#a5a5a5');
                            edgeGrad.addColorStop(1, '#d0d0d0');
                            ctx.fillStyle = edgeGrad;
                            ctx.fill();
                             
                            // 坑底
                            const floorR = r * 0.7;
                            ctx.beginPath();
                            ctx.arc(x, y, floorR, 0, Math.PI * 2);
                            const floorGrad = ctx.createRadialGradient(x, y, 0, x, y, floorR);
                            floorGrad.addColorStop(0, '#d5d5d5');
                            floorGrad.addColorStop(1, '#c0c0c0');
                            ctx.fillStyle = floorGrad;
                            ctx.fill();
                             
                            // 可选中心峰
                            if (hasPeak) {
                                const peakR = r * 0.12;
                                ctx.beginPath();
                                ctx.arc(x, y, peakR, 0, Math.PI * 2);
                                ctx.fillStyle = '#e0e0e0';
                                ctx.fill();
                            }
                        }

                        // 添加表面细节
                        function addSurfaceDetails(ctx, size) {
                            // 小型山脊和纹理
                            for (let i = 0; i < 15; i++) {
                                const startX = Math.random() * size * 0.6;
                                const startY = Math.random() * size * 0.5;
                                const length = size * 0.1 + Math.random() * size * 0.2;
                                 
                                ctx.beginPath();
                                ctx.moveTo(startX, startY);
                                 
                                for (let x = startX; x < startX + length; x += 5) {
                                    const offset = Math.sin((x - startX) * 0.05) * 3 + (Math.random() - 0.5) * 2;
                                    ctx.lineTo(x, startY + offset);
                                }
                                 
                                ctx.strokeStyle = 'rgba(0,0,0,0.05)';
                                ctx.lineWidth = 2;
                                ctx.stroke();
                            }
                             
                            // 微小陨坑点缀
                            for (let i = 0; i < 200; i++) {
                                const x = Math.random() * size;
                                const y = Math.random() * size * 0.5;
                                const r = 0.5 + Math.random() * 1.5;
                                 
                                ctx.beginPath();
                                ctx.arc(x, y, r, 0, Math.PI * 2);
                                const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
                                grad.addColorStop(0, '#b5b5b5');
                                grad.addColorStop(1, '#d0d0d0');
                                ctx.fillStyle = grad;
                                ctx.fill();
                            }
                        }

                        // 高质量凹凸贴图
                        function createBumpMap() {
                            const cvs = document.createElement('canvas');
                            const size = 512;
                            cvs.width = size;
                            cvs.height = size / 2;
                            const ctx = cvs.getContext('2d');
                             
                            // 灰色基础
                            ctx.fillStyle = '#888';
                            ctx.fillRect(0, 0, size, size / 2);
                             
                            // 添加主要地形起伏
                            for (let i = 0; i < 3000; i++) {
                                const x = Math.random() * size;
                                const y = Math.random() * size / 2;
                                const r = 0.8 + Math.random() * 3;
                                ctx.fillStyle = Math.random() > 0.6 ? '#666' : '#aaa';
                                ctx.beginPath();
                                ctx.arc(x, y, r, 0, Math.PI * 2);
                                ctx.fill();
                            }
                             
                            // 月海区域（较平坦）
                            function drawFlatArea(x, y, r) {
                                ctx.beginPath();
                                ctx.arc(x, y, r, 0, Math.PI * 2);
                                const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
                                grad.addColorStop(0, '#888');
                                grad.addColorStop(1, '#909090');
                                ctx.fillStyle = grad;
                                ctx.fill();
                            }
                             
                            // 对应月海位置添加平坦区域
                            drawFlatArea(size*0.22, size*0.08, size*0.13);
                            drawFlatArea(size*0.68, size*0.11, size*0.16);
                            drawFlatArea(size*0.43, size*0.19, size*0.11);
                             
                            return new THREE.CanvasTexture(cvs);
                        }

                        // 颜色调整辅助函数
                        function shadeColor(color, percent) {
                            let R = parseInt(color.substring(1, 3), 16);
                            let G = parseInt(color.substring(3, 5), 16);
                            let B = parseInt(color.substring(5, 7), 16);

                            R = parseInt(R * (100 + percent) / 100);
                            G = parseInt(G * (100 + percent) / 100);
                            B = parseInt(B * (100 + percent) / 100);

                            R = Math.min(255, Math.max(0, R));
                            G = Math.min(255, Math.max(0, G));
                            B = Math.min(255, Math.max(0, B));

                            return `#${(R<<16 | G<<8 | B).toString(16).padStart(6, '0')}`;
                        }

                        // 创建月球
                        const moonGeometry = new THREE.SphereGeometry(planet.radius * 0.27, 128, 64); // 增加多边形数量提升细节表现
                        const moon = new THREE.Mesh(
                            moonGeometry,
                            new THREE.MeshStandardMaterial({
                                map: createMoonTexture(),
                                bumpMap: createBumpMap(),
                                bumpScale: 0.45,
                                roughness: 0.9,
                                metalness: 0.05,
                                shininess: 10,
                                // 添加轻微反光效果
                                reflectivity: 0.1
                            })
                        );
                        moon.position.x = planet.radius * 2;
                        mesh.add(moon);
                        planet.moon = moon; // 保存月球引用
                        planet.moon.rotation.y = 0; // 初始化月球旋转角度
                    
                    // 添加月球轨道
                    const moonOrbitGeometry = new THREE.RingGeometry(planet.radius * 2, planet.radius * 2 + 0.5, 64);
                    const moonOrbitMaterial = new THREE.MeshBasicMaterial({
                        color: 0x333333,
                        side: THREE.DoubleSide,
                        transparent: true,
                        opacity: 0.3
                    });
                    const moonOrbit = new THREE.Mesh(moonOrbitGeometry, moonOrbitMaterial);
                    moonOrbit.rotation.x = Math.PI / 2;
                    mesh.add(moonOrbit);

                    // 添加月球名称标签
                    const moonLabel = document.createElement('div');
                    moonLabel.className = 'planet-label';
                    moonLabel.id = 'moonLabel';
                    moonLabel.textContent = '月球';
                    moonLabel.style.position = 'absolute';
                    moonLabel.style.color = 'white';
                    moonLabel.style.fontSize = '14px';
                    moonLabel.style.pointerEvents = 'none';
                    moonLabel.style.zIndex = '50';
                    moonLabel.style.display = 'none'; // 默认隐藏
                    document.body.appendChild(moonLabel);

                    // 构建行星数据对象
                    const planetData = {
                        mesh,
                        orbit,
                        label: div,
                        ...planet,
                        moon: moon,
                        moonLabel: moonLabel,
                        moonInfo: {
                            name: '月球',
                            realDiameter: '3,474公里',
                            realDistance: '38万公里',
                            orbitPeriod: '27.3天',
                            rotationPeriod: '27.3天',
                            temperature: '127°C / -173°C',
                            surface: '岩石, 尘埃'
                        }
                    };
                    planetMeshes.push(planetData);
                } else {
                    // 没有月球的行星
                    const planetData = {
                        mesh,
                        orbit,
                        label: div,
                        ...planet
                    };
                    planetMeshes.push(planetData);
                }

            });

            updateDebugInfo(`已创建 ${planetMeshes.length} 颗行星`);

            // 检查场景中的对象
            updateDebugInfo(`场景中的对象数量: ${scene.children.length}`);
        }

        // 设置事件监听
        function setupEventListeners() {
            // 窗口大小调整事件
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                updateDebugInfo(`窗口已调整大小: ${window.innerWidth}x${window.innerHeight}`);
            });

            // 暂停/播放按钮
            document.getElementById('playPauseBtn').addEventListener('click', () => {
                isPaused = !isPaused;
                document.getElementById('playPauseBtn').textContent = isPaused ? '播放' : '暂停';
                updateDebugInfo(isPaused ? '动画已暂停' : '动画已恢复');
            });

            // 重置视图按钮
            document.getElementById('resetViewBtn').addEventListener('click', () => {
                camera.position.set(0, 300, 800);
                controls.reset();
                updateDebugInfo('视图已重置');
            });

            // 切换轨道显示按钮
            document.getElementById('toggleOrbitsBtn').addEventListener('click', () => {
                showOrbits = !showOrbits;
                planetMeshes.forEach(planet => {
                    planet.orbit.visible = showOrbits;
                });
                document.getElementById('toggleOrbitsBtn').textContent = showOrbits ? '隐藏轨道' : '显示轨道';
                updateDebugInfo(showOrbits ? '轨道已显示' : '轨道已隐藏');
            });

            // 切换星空显示按钮
            document.getElementById('toggleStarsBtn').addEventListener('click', () => {
                showStars = !showStars;
                starField.visible = showStars;
                document.getElementById('toggleStarsBtn').textContent = showStars ? '隐藏星空' : '显示星空';
                updateDebugInfo(showStars ? '星空已显示' : '星空已隐藏');
            });

            // 速度控制
            document.getElementById('speedControl').addEventListener('input', (e) => {
                timeSpeed = parseFloat(e.target.value);
                updateDebugInfo(`时间速度: ${timeSpeed}x`);
            });

            // 全局缩放控制 - 同时控制相机位置和太阳系缩放
            const zoomControl = document.getElementById('zoomControl');
            zoomControl.min = 400;  // 最小缩放 (最接近)
            zoomControl.max = 1600; // 最大缩放 (最远离)
            zoomControl.value = 800; // 默认值
            zoomControl.step = 10;

            document.getElementById('zoomControl').addEventListener('input', (e) => {
                // 计算相机位置 (反向映射)
                camera.position.z = parseFloat(e.target.value);

                // 计算太阳系缩放 (正向映射)
            // 将400-1600的范围映射到0.5-15.0的缩放比例
            const zoomValue = parseFloat(e.target.value);
            const scaleRange = 15.0 - 0.5;
            const zoomRange = 1600 - 400;
            const normalizedZoom = (zoomValue - 400) / zoomRange;
            globalScale = 0.5 + normalizedZoom * scaleRange;

                // 应用太阳系缩放
                solarSystem.scale.set(globalScale, globalScale, globalScale);

                // 更新显示
                updateZoomLevel();
                updateDebugInfo(`全局缩放已更新: ${globalScale.toFixed(2)}倍`);
            });

            // 切换名称显示按钮
            document.getElementById('toggleNamesBtn').addEventListener('click', () => {
                showNames = !showNames;
                document.getElementById('toggleNamesBtn').textContent = showNames ? '隐藏名称' : '显示名称';
                updateDebugInfo(showNames ? '名称已显示' : '名称已隐藏');
                // 更新所有名称显示状态
                planetMeshes.forEach(planet => {
                    planet.label.style.display = showNames ? 'block' : 'none';
                });
                // 更新太阳名称显示状态
                const sunLabel = document.getElementById('sunLabel');
                if (sunLabel) {
                    sunLabel.style.display = showNames ? 'block' : 'none';
                }
            });

            // 行星点击事件
            window.addEventListener('click', onMouseClick);

            // 关闭行星信息按钮 - 仅关闭信息框，不取消追踪
            document.getElementById('closeInfo').addEventListener('click', () => {
                document.getElementById('planetInfo').style.display = 'none';
                updateDebugInfo('信息面板已关闭，视角追踪仍保持');
            });

            // 添加取消追踪按钮
            document.getElementById('cancelTrackingBtn').addEventListener('click', () => {
                document.getElementById('planetInfo').style.display = 'none';
                if (currentTargetPlanet) {
                    currentTargetPlanet = null;
                    updateDebugInfo('已取消行星追踪');
                }
            });

            // 背景音乐控制
            document.getElementById('toggleMusicBtn').addEventListener('click', toggleMusic);

            // 键盘控制
            document.addEventListener('keydown', (event) => {
                if (event.code === 'Space') {
                    isPaused = !isPaused;
                    document.getElementById('playPauseBtn').textContent = isPaused ? '播放' : '暂停';
                    updateDebugInfo(isPaused ? '动画已暂停' : '动画已恢复');
                }
                if (event.code === 'ArrowUp') {
                    timeSpeed = Math.min(timeSpeed + 0.5, 10);
                    document.getElementById('speedControl').value = timeSpeed;
                    updateDebugInfo(`时间速度: ${timeSpeed}x`);
                }
                if (event.code === 'ArrowDown') {
                    timeSpeed = Math.max(timeSpeed - 0.5, 0.1);
                    document.getElementById('speedControl').value = timeSpeed;
                    updateDebugInfo(`时间速度: ${timeSpeed}x`);
                }
            });
        }

        // 处理鼠标点击事件
        function onMouseClick(event) {
            // 计算鼠标位置
            const mouse = new THREE.Vector2();
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            // 更新射线
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);

            // 检测碰撞 - 行星
            const planetIntersects = raycaster.intersectObjects(planetMeshes.map(p => p.mesh));
            let found = false;

            if (planetIntersects.length > 0) {
                const planet = planetMeshes.find(p => p.mesh === planetIntersects[0].object);
                if (planet) {
                    showPlanetInfo(planet);
                    found = true;
                    // 设置当前追踪目标
                    currentTargetPlanet = planet;
                    
                    // 计算最佳观察距离（考虑行星大小和轨道）
                    // 基础距离基于行星半径
                    const baseDistance = planet.radius * 15;
                    // 如果是带环的行星（如土星），增加额外距离
                    const ringAdjustment = planet.hasRings ? planet.radius * 3 : 0;
                    // 综合计算最佳距离
                    targetDistance = Math.max(baseDistance + ringAdjustment, 100);
