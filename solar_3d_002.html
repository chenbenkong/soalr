                    function createSaturnTexture() {
                        const cvs = document.createElement('canvas');
                        const size = 2048;
                        cvs.width = size;
                        cvs.height = size / 2;
                        const ctx = cvs.getContext('2d');

                        // 土星基础色 - 降低亮度的淡金色调
                        const baseColor = '#d4c9a8';
                        ctx.fillStyle = baseColor;
                        ctx.fillRect(0, 0, cvs.width, cvs.height);

                        // 绘制土星的淡色云带
                        drawSaturnBands(ctx, cvs);

                        // 添加表面细节
                        addSaturnDetails(ctx, cvs);

                        return new THREE.CanvasTexture(cvs);
                    }

                    function createRingsTexture() {
                        const cvs = document.createElement('canvas');
                        const size = 2048; // 更高分辨率
                        cvs.width = size;
                        cvs.height = size; // 正方形纹理确保环形均匀
                        const ctx = cvs.getContext('2d');

                        // 透明背景
                        ctx.fillStyle = 'rgba(0, 0, 0, 0)';
                        ctx.fillRect(0, 0, size, size);

                        const centerX = size / 2;
                        const centerY = size / 2;
                        const outerRadius = size * 0.45; // 外环半径
                        const innerRadius = size * 0.25; // 内环半径

                        // 创建环形渐变
                        const ringGradient = ctx.createRadialGradient(
                            centerX, centerY, innerRadius,
                            centerX, centerY, outerRadius
                        );
                        ringGradient.addColorStop(0, 'rgba(255, 240, 210, 0.7)');
                        ringGradient.addColorStop(0.3, 'rgba(255, 240, 210, 0.9)');
                        ringGradient.addColorStop(0.7, 'rgba(255, 240, 210, 0.8)');
                        ringGradient.addColorStop(1, 'rgba(255, 240, 210, 0.5)');

                        // 绘制主环
                        ctx.beginPath();
                        ctx.arc(centerX, centerY, outerRadius, 0, Math.PI * 2);
                        ctx.arc(centerX, centerY, innerRadius, 0, Math.PI * 2, true);
                        ctx.fillStyle = ringGradient;
                        ctx.fill();

                        // 添加卡西尼缝（环间间隙）
                        const gapInner = size * 0.35;
                        const gapOuter = size * 0.37;

                        ctx.beginPath();
                        ctx.arc(centerX, centerY, gapOuter, 0, Math.PI * 2);
                        ctx.arc(centerX, centerY, gapInner, 0, Math.PI * 2, true);
                        ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                        ctx.fill();

                        // 添加更多环缝细节
                        const smallGap1Inner = size * 0.28;
                        const smallGap1Outer = size * 0.29;
                        ctx.beginPath();
                        ctx.arc(centerX, centerY, smallGap1Outer, 0, Math.PI * 2);
                        ctx.arc(centerX, centerY, smallGap1Inner, 0, Math.PI * 2, true);
                        ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
                        ctx.fill();

                        const smallGap2Inner = size * 0.41;
                        const smallGap2Outer = size * 0.42;
                        ctx.beginPath();
                        ctx.arc(centerX, centerY, smallGap2Outer, 0, Math.PI * 2);
                        ctx.arc(centerX, centerY, smallGap2Inner, 0, Math.PI * 2, true);
                        ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
                        ctx.fill();

                        // 添加环的颗粒细节 - 随机分布的冰块和岩石
                        for (let i = 0; i < 8000; i++) {
                            // 随机半径位置
                            const radius = innerRadius + Math.random() * (outerRadius - innerRadius);
                            // 随机角度
                            const angle = Math.random() * Math.PI * 2;

                            // 极坐标转笛卡尔坐标
                            const x = centerX + Math.cos(angle) * radius;
                            const y = centerY + Math.sin(angle) * radius;

                            // 粒子大小
                            const particleSize = 0.3 + Math.random() * 1.2;

                            // 避开缝隙区域
                            const inMainGap = radius > gapInner && radius < gapOuter;
                            const inSmallGap1 = radius > smallGap1Inner && radius < smallGap1Outer;
                            const inSmallGap2 = radius > smallGap2Inner && radius < smallGap2Outer;

                            if (!inMainGap && !inSmallGap1 && !inSmallGap2) {
                                ctx.beginPath();
                                ctx.arc(x, y, particleSize, 0, Math.PI * 2);
                                // 随机亮度
                                const brightness = 0.7 + Math.random() * 0.3;
                                ctx.fillStyle = `rgba(255, 245, 230, ${brightness})`;
                                ctx.fill();
                            }
                        }

                        return new THREE.CanvasTexture(cvs);
                    }

                    // 创建土星几何体 (高细分度)
                    const saturnGeometry = new THREE.SphereGeometry(planet.radius, 256, 128);

                    // 创建高质量材质
                    material = new THREE.MeshStandardMaterial({
                        map: createSaturnTexture(),
                        bumpMap: createSaturnTexture(),
                        bumpScale: 0.08,
                        roughness: 0.92,  // 极高粗糙度减少反光
                        metalness: 0.01,  // 极低金属度
                        emissive: new THREE.Color(0x0a0a0a),  // 轻微自发光平衡亮度
                        emissiveIntensity: 0.08
                    });
                } else if (planet.name === '水星') {
                    // 高质量水星模型实现 - 基于enhanced-mercury.html
                    // 1. 创建水星表面纹理
                    function createMercuryTexture() {
                        const cvs = document.createElement('canvas');
                        const size = 2048; // 提高分辨率
                        cvs.width = size;
                        cvs.height = size / 2;
                        const ctx = cvs.getContext('2d');
                        
                        // 水星基础色调 - 更丰富的灰色到棕色渐变
                        const baseGradient = ctx.createLinearGradient(0, 0, 0, size/2);
                        baseGradient.addColorStop(0, '#e0e0e0'); // 浅灰色
                        baseGradient.addColorStop(0.3, '#d0c8b8'); // 浅棕灰色
                        baseGradient.addColorStop(0.7, '#b3a999'); // 中棕灰色
                        baseGradient.addColorStop(1, '#998a77'); // 深棕灰色
                        ctx.fillStyle = baseGradient;
                        ctx.fillRect(0, 0, size, size / 2);
                        
                        // 添加多层表面纹理噪点
                        addMercuryNoise(ctx, size);
                        
                        // 绘制大型盆地（增强版）
                        drawBasins(ctx, size);
                        
                        // 绘制大量陨石坑（水星表面特征）
                        drawCraters(ctx, size);
                        
                        // 添加悬崖和山脊
                        drawCliffsAndRidges(ctx, size);
                        
                        // 绘制暗色区域（类似水星上的"光斑"特征）
                        drawDarkPatches(ctx, size);
                        
                        // 添加更多表面细节 - 微小陨石坑和纹理
                        addMicroFeatures(ctx, size);
                        
                        return new THREE.CanvasTexture(cvs);
                    }

                    // 添加水星表面噪点 - 增强版
                    function addMercuryNoise(ctx, size) {
                        const img = ctx.getImageData(0, 0, size, size/2);
                        const data = img.data;
                        
                        // 多层噪点增加表面质感
                        for (let layer = 0; layer < 4; layer++) {
                            const scale = 1 + layer * 3;
                            const noiseIntensity = 30 - layer * 5; // 逐层降低噪点强度
                            
                            for (let y = 0; y < size/2; y += scale) {
                                for (let x = 0; x < size; x += scale) {
                                    const index = (y * size + x) * 4;
                                    if (index >= data.length) continue;
                                    
                                    // 更自然的噪点分布
                                    const noise = (Math.sin(x * 0.1) * Math.cos(y * 0.1) + Math.random() - 0.5) * noiseIntensity;
                                    data[index] = Math.min(255, Math.max(0, data[index] + noise));
                                    data[index+1] = Math.min(255, Math.max(0, data[index+1] + noise * 0.95));
                                    data[index+2] = Math.min(255, Math.max(0, data[index+2] + noise * 0.9));
                                }
                            }
                        }
                        
                        ctx.putImageData(img, 0, 0);
                    }

                    // 绘制大型盆地（类似卡路里盆地）- 增强版
                    function drawBasins(ctx, size) {
                        // 卡路里盆地 - 水星上最显著的特征之一
                        const calorisX = size * 0.7;
                        const calorisY = size * 0.25;
                        const calorisR = size * 0.18;
                        
                        // 盆地外环 - 更不规则的边缘
                        ctx.beginPath();
                        for (let j = 0; j < 64; j++) { // 增加线段数量使边缘更平滑
                            const angle = (j / 64) * Math.PI * 2;
                            const rad = calorisR * (0.85 + Math.random() * 0.2);
                            const px = calorisX + Math.cos(angle) * rad;
                            const py = calorisY + Math.sin(angle) * rad;
                            j === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
                        }
                        ctx.closePath();
                        
                        const outerGrad = ctx.createRadialGradient(calorisX, calorisY, 0, calorisX, calorisY, calorisR);
                        outerGrad.addColorStop(0, '#c8c0b0');
                        outerGrad.addColorStop(0.7, '#b8aa95');
                        outerGrad.addColorStop(0.9, '#a89a85');
                        outerGrad.addColorStop(1, '#a69988');
                        ctx.fillStyle = outerGrad;
                        ctx.fill();
                        
                        // 盆地内环
                        const innerR = calorisR * 0.7;
                        ctx.beginPath();
                        ctx.arc(calorisX, calorisY, innerR, 0, Math.PI * 2);
                        
                        const innerGrad = ctx.createRadialGradient(calorisX, calorisY, 0, calorisX, calorisY, innerR);
                        innerGrad.addColorStop(0, '#d6cfc0');
                        innerGrad.addColorStop(0.5, '#d1c9bb');
                        innerGrad.addColorStop(1, '#c8c0b0');
                        ctx.fillStyle = innerGrad;
                        ctx.fill();
                        
                        // 盆地内部细节 - 次级陨石坑
                        for (let i = 0; i < 15; i++) {
                            const angle = Math.random() * Math.PI * 2;
                            const dist = innerR * (0.2 + Math.random() * 0.6);
                            const x = calorisX + Math.cos(angle) * dist;
                            const y = calorisY + Math.sin(angle) * dist;
                            const r = 5 + Math.random() * 15;
                            
                            drawSimpleCrater(ctx, x, y, r, Math.random() > 0.7);
                        }
                        
                        // 盆地周围的山脉环 - 更丰富的细节
                        for (let i = 0; i < 60; i++) {
                            const angle = (i / 60) * Math.PI * 2;
                            const distance = calorisR * (1.01 + Math.random() * 0.2);
                            const x = calorisX + Math.cos(angle) * distance;
                            const y = calorisY + Math.sin(angle) * distance;
                            const width = 4 + Math.random() * 18;
                            const height = 2 + Math.random() * 10;
                            
                            ctx.save();
                            ctx.translate(x, y);
                            ctx.rotate(angle + Math.PI/2 + (Math.random() - 0.5) * 0.3);
                            ctx.fillStyle = '#b0a28f';
                            
                            // 更自然的山脉形状
                            const mountainGradient = ctx.createLinearGradient(-width/2, -height/2, width/2, height/2);
                            mountainGradient.addColorStop(0, '#b8aa95');
                            mountainGradient.addColorStop(1, '#a89a85');
                            ctx.fillStyle = mountainGradient;
                            
                            ctx.fillRect(-width/2, -height/2, width, height);
                            ctx.restore();
                        }
                    }

                    // 绘制水星陨石坑（比火星更多）- 增强版
                    function drawCraters(ctx, size) {
                        // 大型陨石坑 - 增加数量和变化
                        const largeCraters = [
                            {x: size*0.2, y: size*0.2, r: 30},
                            {x: size*0.5, y: size*0.35, r: 25},
                            {x: size*0.3, y: size*0.1, r: 22},
                            {x: size*0.85, y: size*0.3, r: 18},
                            {x: size*0.15, y: size*0.4, r: 20},
                            {x: size*0.65, y: size*0.4, r: 24}
                        ];
                        
                        largeCraters.forEach(crater => {
                            drawDetailedCrater(ctx, crater.x, crater.y, crater.r);
                        });
                        
                        // 中型陨石坑 - 增加数量
                        for (let i = 0; i < 30; i++) {
                            const x = Math.random() * size;
                            const y = Math.random() * size * 0.5;
                            const r = 6 + Math.random() * 18;
                            
                            // 避免与大型陨石坑重叠过多
                            let overlap = false;
                            largeCraters.forEach(crater => {
                                if (Math.hypot(x - crater.x, y - crater.y) < crater.r * 1.3) {
                                    overlap = true;
                                }
                            });
                            
                            if (!overlap) {
                                drawSimpleCrater(ctx, x, y, r, Math.random() > 0.35);
                            }
                        }
                        
                        // 小型陨石坑 - 增加数量和变化
                        for (let i = 0; i < 300; i++) {
                            const x = Math.random() * size;
                            const y = Math.random() * size * 0.5;
                            const r = 0.8 + Math.random() * 8;
                            
                            ctx.beginPath();
                            ctx.arc(x, y, r, 0, Math.PI * 2);
                            const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
                            grad.addColorStop(0, `rgb(${80 + Math.random() * 20}, ${80 + Math.random() * 20}, ${80 + Math.random() * 15})`);
                            grad.addColorStop(0.7, `rgb(${70 + Math.random() * 20}, ${70 + Math.random() * 20}, ${70 + Math.random() * 15})`);
                            grad.addColorStop(1, `rgb(${130 + Math.random() * 20}, ${130 + Math.random() * 20}, ${120 + Math.random() * 20})`);
                            ctx.fillStyle = grad;
                            ctx.fill();
                        }
                    }

                    // 详细陨石坑绘制 - 增强版
                    function drawDetailedCrater(ctx, x, y, r) {
                        // 不规则坑边缘
                        ctx.beginPath();
                        for (let j = 0; j < 32; j++) { // 更多线段使边缘更平滑
                            const angle = (j / 32) * Math.PI * 2;
                            const rad = r * (0.75 + Math.random() * 0.4);
                            const px = x + Math.cos(angle) * rad;
                            const py = y + Math.sin(angle) * rad;
                            j === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
                        }
                        ctx.closePath();
                        
                        // 坑边缘阴影 - 更丰富的层次感
                        const edgeGrad = ctx.createRadialGradient(x, y, 0, x, y, r);
                        edgeGrad.addColorStop(0, '#8a8a8a');
                        edgeGrad.addColorStop(0.3, '#808080');
                        edgeGrad.addColorStop(0.6, '#757575');
                        edgeGrad.addColorStop(0.85, '#909090');
                        edgeGrad.addColorStop(1, '#b3b3b3');
                        ctx.fillStyle = edgeGrad;
                        ctx.fill();
                        
                        // 坑底
                        const floorR = r * 0.8;
                        ctx.beginPath();
                        ctx.arc(x, y, floorR, 0, Math.PI * 2);
                        const floorGrad = ctx.createRadialGradient(x, y, 0, x, y, floorR);
                        floorGrad.addColorStop(0, '#999999');
                        floorGrad.addColorStop(0.5, '#909090');
                        floorGrad.addColorStop(1, '#858585');
                        ctx.fillStyle = floorGrad;
                        ctx.fill();
                        
                        // 坑内次级小坑
                        if (r > 18) {
                            for (let i = 0; i < 3 + Math.random() * 5; i++) {
                                const angle = Math.random() * Math.PI * 2;
                                const dist = floorR * (0.2 + Math.random() * 0.6);
                                const subX = x + Math.cos(angle) * dist;
                                const subY = y + Math.sin(angle) * dist;
                                const subR = 1 + Math.random() * (r * 0.15);
                                
                                ctx.beginPath();
                                ctx.arc(subX, subY, subR, 0, Math.PI * 2);
                                const subGrad = ctx.createRadialGradient(subX, subY, 0, subX, subY, subR);
                                subGrad.addColorStop(0, '#808080');
                                subGrad.addColorStop(1, '#959595');
                                ctx.fillStyle = subGrad;
                                ctx.fill();
                            }
                        }
                        
                        // 中心峰 - 更复杂的形状
                        if (r > 15) { 
                            const peakR = r * 0.12;
                            
                            // 多峰结构
                            for (let i = 0; i < 1 + Math.floor(Math.random() * 3); i++) {
                                const angle = (i / 3) * Math.PI * 2;
                                const peakOffset = peakR * 0.5 * Math.random();
                                const peakX = x + Math.cos(angle) * peakOffset;
                                const peakY = y + Math.sin(angle) * peakOffset;
                                const peakSize = peakR * (0.5 + Math.random() * 0.5);
                                
                                ctx.beginPath();
                                ctx.arc(peakX, peakY, peakSize, 0, Math.PI * 2);
                                const peakGrad = ctx.createRadialGradient(peakX, peakY, 0, peakX, peakY, peakSize);
                                peakGrad.addColorStop(0, '#b3b3b3');
                                peakGrad.addColorStop(1, '#999999');
                                ctx.fillStyle = peakGrad;
                                ctx.fill();
                            }
                        }
                    }

                    // 简单陨石坑绘制 - 增强版
                    function drawSimpleCrater(ctx, x, y, r, hasPeak) {
                        // 不规则坑边缘
                        ctx.beginPath();
                        for (let j = 0; j < 20; j++) {
                            const angle = (j / 20) * Math.PI * 2;
                            const rad = r * (0.8 + Math.random() * 0.3);
                            const px = x + Math.cos(angle) * rad;
                            const py = y + Math.sin(angle) * rad;
                            j === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
                        }
                        ctx.closePath();
                        
                        // 坑边缘阴影
                        const edgeGrad = ctx.createRadialGradient(x, y, 0, x, y, r);
                        edgeGrad.addColorStop(0, '#959595');
                        edgeGrad.addColorStop(0.6, '#858585');
                        edgeGrad.addColorStop(0.9, '#a0a0a0');
                        edgeGrad.addColorStop(1, '#b0b0b0');
                        ctx.fillStyle = edgeGrad;
                        ctx.fill();
                        
                        // 坑底
                        const floorR = r * 0.75;
                        ctx.beginPath();
                        ctx.arc(x, y, floorR, 0, Math.PI * 2);
                        const floorGrad = ctx.createRadialGradient(x, y, 0, x, y, floorR);
                        floorGrad.addColorStop(0, '#a0a0a0');
                        floorGrad.addColorStop(1, '#8a8a8a');
                        ctx.fillStyle = floorGrad;
                        ctx.fill();
                        
                        // 可选中心峰
                        if (hasPeak) {
                            const peakR = r * 0.1;
                            ctx.beginPath();
                            ctx.arc(x, y, peakR, 0, Math.PI * 2);
                            ctx.fillStyle = '#a6a6a6';
                            ctx.fill();
                        }
                    }

                    // 绘制悬崖和山脊（水星表面特征）- 增强版
                    function drawCliffsAndRidges(ctx, size) {
                        // 大型悬崖系统
                        const cliffSystems = [
                            {startX: size*0.1, startY: size*0.25, length: size*0.6, amplitude: 15},
                            {startX: size*0.3, startY: size*0.4, length: size*0.5, amplitude: 10},
                            {startX: size*0.05, startY: size*0.1, length: size*0.4, amplitude: 8},
                            {startX: size*0.6, startY: size*0.15, length: size*0.35, amplitude: 12}
                        ];
                        
                        cliffSystems.forEach(cliff => {
                            ctx.beginPath();
                            ctx.moveTo(cliff.startX, cliff.startY);
                            
                            for (let x = cliff.startX; x < cliff.startX + cliff.length && x < size; x += 6) {
                                // 更自然的山脉起伏
                                const offset = Math.sin((x - cliff.startX) * 0.02) * cliff.amplitude * 0.5 + 
                                              Math.sin((x - cliff.startX) * 0.05) * cliff.amplitude * 0.3 +
                                              (Math.random() - 0.5) * cliff.amplitude * 0.4;
                                ctx.lineTo(x, cliff.startY + offset);
                            }
                            
                            ctx.lineWidth = 2 + Math.random() * 6;
                            ctx.strokeStyle = '#8c8c8c';
                            ctx.stroke();
                            
                            // 悬崖阴影 - 更明显的效果
                            ctx.lineWidth = 1;
                            ctx.strokeStyle = 'rgba(0,0,0,0.15)';
                            ctx.stroke();
                        });
                        
                        // 小型山脊 - 增加数量
                        for (let i = 0; i < 25; i++) {
                            const startX = Math.random() * size;
                            const startY = Math.random() * size * 0.5;
                            const length = size * 0.05 + Math.random() * size * 0.25;
                            const amplitude = 2 + Math.random() * 8;
                            
                            ctx.beginPath();
                            ctx.moveTo(startX, startY);
                            
                            for (let x = startX; x < startX + length && x < size; x += 4) {
                                const offset = Math.sin((x - startX) * 0.05) * amplitude * 0.5 + 
                                              Math.sin((x - startX) * 0.12) * amplitude * 0.3 +
                                              (Math.random() - 0.5) * amplitude * 0.4;
                                ctx.lineTo(x, startY + offset);
                            }
                            
                            ctx.lineWidth = 1 + Math.random() * 3;
                            ctx.strokeStyle = '#999999';
                            ctx.stroke();
                        }
                    }

                    // 绘制暗色区域（水星表面特征）- 增强版
                    function drawDarkPatches(ctx, size) {
                        const patches = [
                            {x: size*0.25, y: size*0.15, r: size*0.12},
                            {x: size*0.6, y: size*0.1, r: size*0.08},
                            {x: size*0.4, y: size*0.35, r: size*0.1},
                            {x: size*0.8, y: size*0.18, r: size*0.07}
                        ];
                        
                        patches.forEach(patch => {
                            // 不规则形状的暗色区域
                            ctx.beginPath();
                            for (let i = 0; i < 32; i++) {
                                const angle = (i / 32) * Math.PI * 2;
                                const rad = patch.r * (0.6 + Math.random() * 0.5);
                                const px = patch.x + Math.cos(angle) * rad;
                                const py = patch.y + Math.sin(angle) * rad;
                                i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
                            }
                            ctx.closePath();
                            
                            const grad = ctx.createRadialGradient(patch.x, patch.y, 0, patch.x, patch.y, patch.r);
                            grad.addColorStop(0, 'rgba(140, 130, 120, 0.85)');
                            grad.addColorStop(0.7, 'rgba(145, 135, 125, 0.6)');
                            grad.addColorStop(1, 'rgba(150, 140, 130, 0.1)');
                            ctx.fillStyle = grad;
                            ctx.fill();
                            
                            // 暗色区域内的纹理
                            for (let i = 0; i < 50; i++) {
                                const angle = Math.random() * Math.PI * 2;
                                const dist = Math.random() * patch.r * 0.8;
                                const x = patch.x + Math.cos(angle) * dist;
                                const y = patch.y + Math.sin(angle) * dist;
                                const r = 2 + Math.random() * 8;
                                
                                ctx.beginPath();
                                ctx.arc(x, y, r, 0, Math.PI * 2);
                                ctx.fillStyle = `rgba(130, 120, 110, ${0.2 + Math.random() * 0.3})`;
                                ctx.fill();
                            }
                        });
                    }

                    // 添加微观特征 - 新增功能
                    function addMicroFeatures(ctx, size) {
                        // 微小的陨石坑和表面纹理
                        for (let i = 0; i < 1000; i++) {
                            const x = Math.random() * size;
                            const y = Math.random() * size * 0.5;
                            const r = 0.3 + Math.random() * 2;
                            
                            const shade = 70 + Math.random() * 50;
                            ctx.fillStyle = `rgb(${shade}, ${shade * 0.95}, ${shade * 0.9})`;
                            ctx.beginPath();
                            ctx.arc(x, y, r, 0, Math.PI * 2);
                            ctx.fill();
                        }
                        
                        // 表面纹理条纹
                        for (let i = 0; i < 20; i++) {
                            const angle = Math.random() * Math.PI * 2;
                            const centerX = Math.random() * size;
                            const centerY = Math.random() * size * 0.5;
                            const length = size * 0.2 + Math.random() * size * 0.5;
                            const width = 5 + Math.random() * 20;
                            
                            ctx.save();
                            ctx.translate(centerX, centerY);
                            ctx.rotate(angle);
                            
                            const gradient = ctx.createLinearGradient(-length/2, -width/2, length/2, width/2);
                            gradient.addColorStop(0, 'rgba(130, 125, 120, 0.1)');
                            gradient.addColorStop(0.5, 'rgba(130, 125, 120, 0.3)');
                            gradient.addColorStop(1, 'rgba(130, 125, 120, 0.1)');
                            
                            ctx.fillStyle = gradient;
                            ctx.fillRect(-length/2, -width/2, length, width);
                            ctx.restore();
                        }
                    }

                    // 水星表面凹凸贴图 - 增强版
                    function createMercuryBumpMap() {
                        const cvs = document.createElement('canvas');
                        const size = 1024; // 提高分辨率
                        cvs.width = size;
                        cvs.height = size / 2;
                        const ctx = cvs.getContext('2d');
                        
                        // 灰色基础
                        ctx.fillStyle = '#888';
                        ctx.fillRect(0, 0, size, size / 2);
                        
                        // 添加地形起伏 - 更多细节
                        for (let i = 0; i < 8000; i++) {
                            const x = Math.random() * size;
                            const y = Math.random() * size / 2;
                            const r = 0.3 + Math.random() * 3;
                            
                            // 灰色调的高度变化
                            const value = 60 + Math.random() * 50;
                            ctx.fillStyle = `rgb(${value}, ${value}, ${value * 0.95})`;
                            ctx.beginPath();
                            ctx.arc(x, y, r, 0, Math.PI * 2);
                            ctx.fill();
                        }
                        
                        // 大型盆地区域
                        const calorisX = size * 0.7;
                        const calorisY = size * 0.25;
                        const calorisR = size * 0.18;
                        
                        const basinGrad = ctx.createRadialGradient(calorisX, calorisY, 0, calorisX, calorisY, calorisR);
                        basinGrad.addColorStop(0, '#555');
                        basinGrad.addColorStop(0.5, '#666');
                        basinGrad.addColorStop(0.8, '#777');
                        basinGrad.addColorStop(1, '#888');
                        
                        ctx.beginPath();
                        ctx.arc(calorisX, calorisY, calorisR, 0, Math.PI * 2);
                        ctx.fillStyle = basinGrad;
                        ctx.fill();
                        
                        // 盆地周围山脉
                        for (let i = 0; i < 60; i++) {
                            const angle = (i / 60) * Math.PI * 2;
                            const distance = calorisR * (1.02 + Math.random() * 0.15);
                            const x = calorisX + Math.cos(angle) * distance;
                            const y = calorisY + Math.sin(angle) * distance;
                            const width = 3 + Math.random() * 10;
                            const height = 2 + Math.random() * 7;
                            
                            ctx.save();
                            ctx.translate(x, y);
                            ctx.rotate(angle + Math.PI/2);
                            ctx.fillStyle = '#444';
                            ctx.fillRect(-width/2, -height/2, width, height);
                            ctx.restore();
                        }
                        
                        // 添加额外的地形特征
                        for (let i = 0; i < 15; i++) {
                            const x = Math.random() * size;
                            const y = Math.random() * size / 2;
                            const radius = 20 + Math.random() * 50;
                            
                            const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
                            gradient.addColorStop(0, '#777');
                            gradient.addColorStop(0.6, '#888');
                            gradient.addColorStop(1, '#777');
                            
                            ctx.beginPath();
                            ctx.arc(x, y, radius, 0, Math.PI * 2);
                            ctx.fillStyle = gradient;
                            ctx.fill();
                        }
                        
                        return new THREE.CanvasTexture(cvs);
                    }

                    // 创建高质量材质
                    material = new THREE.MeshStandardMaterial({
                        map: createMercuryTexture(),
                        bumpMap: createMercuryBumpMap(),
                        bumpScale: 0.8, // 增加凹凸感
                        roughness: 0.85, // 稍微增加粗糙度
                        metalness: 0.25,
                        shininess: 15,
                        reflectivity: 0.15, // 略微提高反光
                        normalScale: new THREE.Vector2(0.5, 0.5) // 添加法线缩放
                    });
                } else {
                    // 其他行星的普通材质
                    material = new THREE.MeshPhongMaterial({
                        color: planet.color,
                        shininess: 10,
                        emissive: 0x000000,
                        emissiveIntensity: 0.2
                    });
                }
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.x = planet.distance;
                mesh.rotation.x = THREE.MathUtils.degToRad(planet.tilt);
                solarSystem.add(mesh);

                // 为木星添加动态效果 - 基于 muxing.html 实现
                    if (planet.name === '木星') {
                        // 添加木星大气效果
                        const atmosphereGeometry = new THREE.SphereGeometry(planet.radius * 1.05, 128, 128);
                        const atmosphereMaterial = new THREE.ShaderMaterial({
                            uniforms: {
                                'c': { value: 0.8 },
                                'p': { value: 4.0 },
                                'opacity': { value: 0.3 },
                                'color': { value: new THREE.Color(0xffffff) }
                            },
                            vertexShader: `
                                varying vec3 vNormal;
                                void main() {
                                    vNormal = normalize(normalMatrix * normal);
                                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                                }
                            `,
                            fragmentShader: `
                                uniform float c;
                                uniform float p;
                                uniform float opacity;
                                uniform vec3 color;
                                varying vec3 vNormal;
                                void main() {
                                    float intensity = pow(c - dot(vNormal, vec3(0.0, 0.0, 1.0)), p);
                                    gl_FragColor = vec4(color, intensity * opacity);
                                }
                            `,
                            transparent: true,
                            side: THREE.BackSide
                        });

                        const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
                        mesh.add(atmosphere);

                        // 保存材质引用以便动画更新
                        planet.atmosphereMaterial = atmosphereMaterial;
                    }

                // 创建更美观的轨道
                const orbitGeometry = new THREE.RingGeometry(planet.distance, planet.distance + 0.5, 256);
                const orbitMaterial = new THREE.MeshBasicMaterial({
                    color: 0x555555,
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: 0.7,
                    depthWrite: false, // 防止轨道穿模
                    polygonOffset: true,
                    polygonOffsetFactor: -1,
                    polygonOffsetUnits: -1
                });
                const orbit = new THREE.Mesh(orbitGeometry, orbitMaterial);
                orbit.rotation.x = Math.PI / 2;
                solarSystem.add(orbit);
                orbit.visible = true; // 确保轨道默认可见

                // 创建行星名称标签
                const div = document.createElement('div');
                div.className = 'planet-label';
                div.textContent = planet.name;
                div.style.position = 'absolute';
                div.style.color = 'white';
                div.style.fontSize = '14px';
                div.style.pointerEvents = 'none';
                div.style.zIndex = '50';
                div.style.display = 'none'; // 默认隐藏
                document.body.appendChild(div);

                // 添加行星大气效果
                        if (planet.name === '火星') {
                            // 高质量火星模型实现
                            // 1. 创建火星表面纹理
                            function createMarsTexture() {
                                const cvs = document.createElement('canvas');
                                const size = 1024;
                                cvs.width = size;
                                cvs.height = size / 2;
                                const ctx = cvs.getContext('2d');
                                 
                                // 火星基础色调 - 红色到橙色渐变
                                const baseGradient = ctx.createLinearGradient(0, 0, 0, size/2);
                                baseGradient.addColorStop(0, '#b35a3c'); // 浅红色
                                baseGradient.addColorStop(1, '#8b3e2f'); // 深红色
                                ctx.fillStyle = baseGradient;
                                ctx.fillRect(0, 0, size, size / 2);
                                 
                                // 添加表面噪点纹理
                                addMarsNoise(ctx, size);
                                 
                                // 绘制主要地形特征
                                drawMartianRegions(ctx, size);
                                 
                                // 绘制极地冰盖
                                drawPolarCaps(ctx, size);
                                 
                                // 绘制陨石坑
                                drawCraters(ctx, size);
                                 
                                // 添加峡谷和山脉
                                drawValleysAndMountains(ctx, size);
                                 
                                return new THREE.CanvasTexture(cvs);
                            }

                            // 添加火星表面噪点
                            function addMarsNoise(ctx, size) {
                                const img = ctx.getImageData(0, 0, size, size/2);
                                const data = img.data;
                                 
                                // 多层噪点增加表面质感
                                for (let layer = 0; layer < 2; layer++) {
                                    const scale = 2 + layer * 3;
                                    for (let y = 0; y < size/2; y += scale) {
                                        for (let x = 0; x < size; x += scale) {
                                            const index = (y * size + x) * 4;
                                            if (index >= data.length) continue;
                                             
                                            // 红色调的噪点变化
                                            const noise = (Math.random() - 0.5) * 60;
                                            data[index] = Math.min(255, Math.max(0, data[index] + noise));
                                            data[index+1] = Math.min(255, Math.max(0, data[index+1] + noise * 0.7));
                                            data[index+2] = Math.min(255, Math.max(0, data[index+2] + noise * 0.5));
                                        }
                                    }
                                }
                                 
                                ctx.putImageData(img, 0, 0);
                            }

                            // 绘制火星主要区域（亮区和暗区）
                            function drawMartianRegions(ctx, size) {
                                // 亮区（Terra）
                                function drawBrightRegion(x, y, r, points) {
                                    ctx.beginPath();
                                    for (let i = 0; i < points; i++) {
                                        const angle = (i / points) * Math.PI * 2;
                                        const rad = r * (0.7 + Math.random() * 0.3);
                                        const px = x + Math.cos(angle) * rad;
                                        const py = y + Math.sin(angle) * rad;
                                        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
                                    }
                                    ctx.closePath();
                                     
                                    const gradient = ctx.createRadialGradient(x, y, 0, x, y, r);
                                    gradient.addColorStop(0, '#cc6644');
                                    gradient.addColorStop(1, '#b35a3c');
                                    ctx.fillStyle = gradient;
                                    ctx.fill();
                                }
                                 
                                // 暗区（Mare）
                                function drawDarkRegion(x, y, r, points) {
                                    ctx.beginPath();
                                    for (let i = 0; i < points; i++) {
                                        const angle = (i / points) * Math.PI * 2;
                                        const rad = r * (0.7 + Math.random() * 0.3);
                                        const px = x + Math.cos(angle) * rad;
                                        const py = y + Math.sin(angle) * rad;
                                        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
                                    }
                                    ctx.closePath();
                                     
                                    const gradient = ctx.createRadialGradient(x, y, 0, x, y, r);
                                    gradient.addColorStop(0, '#8b3e2f');
                                    gradient.addColorStop(1, '#7d3628');
                                    ctx.fillStyle = gradient;
                                    ctx.fill();
                                }
                                 
                                // 绘制主要区域
                                drawBrightRegion(size * 0.25, size * 0.15, size * 0.18, 12);
                                drawBrightRegion(size * 0.7, size * 0.3, size * 0.15, 10);
                                drawDarkRegion(size * 0.6, size * 0.12, size * 0.12, 8);
                                drawDarkRegion(size * 0.3, size * 0.35, size * 0.1, 9);
                                drawDarkRegion(size * 0.85, size * 0.25, size * 0.08, 7);
                            }

                            // 绘制不规则极地冰盖
                            function drawPolarCaps(ctx, size) {
                                // 生成不规则形状的函数
                                function createIrregularShape(cx, cy, baseRadius, points, distortion) {
                                    const coords = [];
                                    for (let i = 0; i < points; i++) {
                                        const angle = (i / points) * Math.PI * 2;
                                        // 每个点的半径随机变化，创建不规则形状
                                        const radius = baseRadius * (0.7 + Math.random() * distortion);
                                        const x = cx + Math.cos(angle) * radius;
                                        const y = cy + Math.sin(angle) * radius;
                                        coords.push({x, y});
                                    }
                                    return coords;
                                }
                                 
                                // 绘制不规则形状
                                function drawIrregularShape(coords, gradient) {
                                    ctx.beginPath();
                                    ctx.moveTo(coords[0].x, coords[0].y);
                                    for (let i = 1; i < coords.length; i++) {
                                        ctx.lineTo(coords[i].x, coords[i].y);
                                    }
                                    ctx.closePath();
                                    ctx.fillStyle = gradient;
                                    ctx.fill();
                                }
                                 
                                // 北极冰盖
                                const northCx = size * 0.52;
                                const northCy = size * 0.06;
                                const northBaseRadius = size * 0.13;
                                const northPoints = 24;
                                const northDistortion = 0.4;
                                const northCoords = createIrregularShape(northCx, northCy, northBaseRadius, northPoints, northDistortion);
                                const northGradient = ctx.createLinearGradient(0, 0, 0, northCy + northBaseRadius);
                                northGradient.addColorStop(0, 'rgba(255, 255, 255, 0.95)');
                                northGradient.addColorStop(0.5, 'rgba(230, 245, 255, 0.8)');
                                northGradient.addColorStop(1, 'rgba(220, 240, 255, 0)');
                                drawIrregularShape(northCoords, northGradient);
                                 
                                // 南极冰盖
                                const southCx = size * 0.48;
                                const southCy = size * 0.43;
                                const southBaseRadius = size * 0.11;
                                const southPoints = 20;
                                const southDistortion = 0.35;
                                const southCoords = createIrregularShape(southCx, southCy, southBaseRadius, southPoints, southDistortion);
                                const southGradient = ctx.createLinearGradient(0, southCy - southBaseRadius, 0, size * 0.5);
                                southGradient.addColorStop(0, 'rgba(220, 240, 255, 0)');
                                southGradient.addColorStop(0.5, 'rgba(230, 245, 255, 0.8)');
                                southGradient.addColorStop(1, 'rgba(255, 255, 255, 0.95)');
                                drawIrregularShape(southCoords, southGradient);
                            }

                            // 绘制火星陨石坑
                            function drawCraters(ctx, size) {
                                // 大型陨石坑
                                const largeCraters = [
                                    {x: size*0.2, y: size*0.22, r: 22},
                                    {x: size*0.65, y: size*0.28, r: 28},
                                    {x: size*0.45, y: size*0.12, r: 18},
                                    {x: size*0.8, y: size*0.35, r: 20}
                                ];
                                 
                                largeCraters.forEach(crater => {
                                    drawDetailedCrater(ctx, crater.x, crater.y, crater.r);
                                });
                                 
                                // 中型陨石坑
                                for (let i = 0; i < 12; i++) {
                                    const x = Math.random() * size;
                                    const y = Math.random() * size * 0.5;
                                    const r = 8 + Math.random() * 12;
                                     
                                    // 避免与大型陨石坑重叠过多
                                    let overlap = false;
                                    largeCraters.forEach(crater => {
                                        if (Math.hypot(x - crater.x, y - crater.y) < crater.r * 1.2) {
                                            overlap = true;
                                        }
                                    });
                                     
                                    // 避开极地冰盖区域
                                    if (y < size * 0.15 || y > size * 0.35) {
                                        overlap = true;
                                    }
                                     
                                    if (!overlap) {
                                        drawSimpleCrater(ctx, x, y, r, Math.random() > 0.3);
                                    }
                                }
                                 
                                // 小型陨石坑
                                for (let i = 0; i < 80; i++) {
                                    const x = Math.random() * size;
                                    const y = Math.random() * size * 0.5;
                                    const r = 2 + Math.random() * 5;
                                     
                                    // 避开极地冰盖区域
                                    if (y < size * 0.15 || y > size * 0.35) {
                                        continue;
                                    }
                                     
                                    ctx.beginPath();
                                    ctx.arc(x, y, r, 0, Math.PI * 2);
                                    const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
                                    grad.addColorStop(0, '#994a33');
                                    grad.addColorStop(0.7, '#803c2a');
                                    grad.addColorStop(1, '#b35a3c');
                                    ctx.fillStyle = grad;
                                    ctx.fill();
                                }
                            }

                            // 详细陨石坑绘制
                            function drawDetailedCrater(ctx, x, y, r) {
                                // 不规则坑边缘
                                ctx.beginPath();
                                for (let j = 0; j < 12; j++) {
                                    const angle = (j / 12) * Math.PI * 2;
                                    const rad = r * (0.8 + Math.random() * 0.25);
                                    const px = x + Math.cos(angle) * rad;
                                    const py = y + Math.sin(angle) * rad;
                                    j === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
                                }
                                ctx.closePath();
                                 
                                // 坑边缘阴影
                                const edgeGrad = ctx.createRadialGradient(x, y, 0, x, y, r);
                                edgeGrad.addColorStop(0, '#994a33');
                                edgeGrad.addColorStop(0.5, '#7d3628');
                                edgeGrad.addColorStop(1, '#b35a3c');
                                ctx.fillStyle = edgeGrad;
                                ctx.fill();
                                 
                                // 坑底
                                const floorR = r * 0.75;
                                ctx.beginPath();
                                ctx.arc(x, y, floorR, 0, Math.PI * 2);
                                const floorGrad = ctx.createRadialGradient(x, y, 0, x, y, floorR);
                                floorGrad.addColorStop(0, '#8c4230');
                                floorGrad.addColorStop(1, '#7d3628');
                                ctx.fillStyle = floorGrad;
                                ctx.fill();
                                 
                                // 中心峰
                                const peakR = r * 0.15;
                                ctx.beginPath();
                                ctx.arc(x, y, peakR, 0, Math.PI * 2);
                                const peakGrad = ctx.createRadialGradient(x, y, 0, x, y, peakR);
                                peakGrad.addColorStop(0, '#a65038');
                                peakGrad.addColorStop(1, '#994a33');
                                ctx.fillStyle = peakGrad;
                                ctx.fill();
                            }

                            // 简单陨石坑绘制
                            function drawSimpleCrater(ctx, x, y, r, hasPeak) {
                                // 不规则坑边缘
                                ctx.beginPath();
                                for (let j = 0; j < 8; j++) {
                                    const angle = (j / 8) * Math.PI * 2;
                                    const rad = r * (0.8 + Math.random() * 0.2);
                                    const px = x + Math.cos(angle) * rad;
                                    const py = y + Math.sin(angle) * rad;
                                    j === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
                                }
                                ctx.closePath();
                                 
                                // 坑边缘阴影
                                const edgeGrad = ctx.createRadialGradient(x, y, 0, x, y, r);
                                edgeGrad.addColorStop(0, '#964832');
                                edgeGrad.addColorStop(0.6, '#7a3527');
                                edgeGrad.addColorStop(1, '#b0583a');
                                ctx.fillStyle = edgeGrad;
                                ctx.fill();
                                 
                                // 坑底
                                const floorR = r * 0.7;
                                ctx.beginPath();
                                ctx.arc(x, y, floorR, 0, Math.PI * 2);
                                const floorGrad = ctx.createRadialGradient(x, y, 0, x, y, floorR);
                                floorGrad.addColorStop(0, '#8a402e');
                                floorGrad.addColorStop(1, '#7a3527');
                                ctx.fillStyle = floorGrad;
                                ctx.fill();
                                 
                                // 可选中心峰
                                if (hasPeak) {
                                    const peakR = r * 0.12;
                                    ctx.beginPath();
                                    ctx.arc(x, y, peakR, 0, Math.PI * 2);
                                    ctx.fillStyle = '#9e4c35';
                                    ctx.fill();
                                }
                            }

                            // 绘制峡谷和山脉
                            function drawValleysAndMountains(ctx, size) {
                                // 绘制主要峡谷（类似水手谷）
                                ctx.beginPath();
                                ctx.moveTo(size * 0.1, size * 0.25);
                                 
                                for (let x = size * 0.1; x < size * 0.9; x += 10) {
                                    const offset = Math.sin((x - size * 0.1) * 0.01) * 8 + (Math.random() - 0.5) * 4;
                                    ctx.lineTo(x, size * 0.25 + offset);
                                }
                                 
                                ctx.lineWidth = 15;
                                ctx.strokeStyle = '#803c2a';
                                ctx.stroke();
                                 
                                // 绘制次要地形线条
                                for (let i = 0; i < 10; i++) {
                                    const startX = Math.random() * size;
                                    const startY = size * 0.15 + Math.random() * size * 0.2;
                                    const length = size * 0.1 + Math.random() * size * 0.2;
                                     
                                    ctx.beginPath();
                                    ctx.moveTo(startX, startY);
                                     
                                    for (let x = startX; x < startX + length && x < size; x += 5) {
                                        const offset = Math.sin((x - startX) * 0.02) * 3 + (Math.random() - 0.5) * 2;
                                        ctx.lineTo(x, startY + offset);
                                    }
                                     
                                    ctx.strokeStyle = Math.random() > 0.5 ? '#803c2a' : '#cc6644';
                                    ctx.lineWidth = 2 + Math.random() * 3;
                                    ctx.stroke();
                                }
                                 
                                // 绘制奥林帕斯山区域
                                const olympusX = size * 0.8;
                                const olympusY = size * 0.12;
                                const olympusR = size * 0.08;
                                 
                                const olympusGrad = ctx.createRadialGradient(olympusX, olympusY, 0, olympusX, olympusY, olympusR);
                                olympusGrad.addColorStop(0, '#cc6644');
                                olympusGrad.addColorStop(1, '#b35a3c');
                                 
                                ctx.beginPath();
                                ctx.arc(olympusX, olympusY, olympusR, 0, Math.PI * 2);
                                ctx.fillStyle = olympusGrad;
                                ctx.fill();
                            }

                            // 2. 创建火星表面凹凸贴图
                            function createMarsBumpMap() {
                                const cvs = document.createElement('canvas');
                                const size = 512;
                                cvs.width = size;
                                cvs.height = size / 2;
                                const ctx = cvs.getContext('2d');
                                 
                                // 灰色基础
                                ctx.fillStyle = '#888';
                                ctx.fillRect(0, 0, size, size / 2);
                                 
                                // 添加地形起伏
                                for (let i = 0; i < 2000; i++) {
                                    const x = Math.random() * size;
                                    const y = Math.random() * size / 2;
                                    const r = 0.8 + Math.random() * 3;
                                     
                                    // 高度变化
                                    const value = 70 + Math.random() * 30;
                                    ctx.fillStyle = `rgb(${value}, ${value * 0.6}, ${value * 0.4})`;
                                    ctx.beginPath();
                                    ctx.arc(x, y, r, 0, Math.PI * 2);
                                    ctx.fill();
                                }
                                 
                                // 极地冰盖区域（较平坦）
                                function drawFlatPolarArea(cx, cy, r) {
                                    // 使用不规则形状匹配冰盖
                                    const coords = [];
                                    const points = 20;
                                    for (let i = 0; i < points; i++) {
                                        const angle = (i / points) * Math.PI * 2;
                                        const radius = r * (0.7 + Math.random() * 0.3);
                                        coords.push({
                                            x: cx + Math.cos(angle) * radius,
                                            y: cy + Math.sin(angle) * radius
                                        });
                                    }
                                     
                                    ctx.beginPath();
                                    ctx.moveTo(coords[0].x, coords[0].y);
                                    for (let i = 1; i < points; i++) {
                                        ctx.lineTo(coords[i].x, coords[i].y);
                                    }
                                    ctx.closePath();
                                     
                                    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
                                    grad.addColorStop(0, '#909090');
                                    grad.addColorStop(1, '#888');
                                    ctx.fillStyle = grad;
                                    ctx.fill();
                                }
                                 
                                // 绘制平坦的极地区域
                                drawFlatPolarArea(size * 0.52, size * 0.06, size * 0.13);
                                drawFlatPolarArea(size * 0.48, size * 0.43, size * 0.11);
                                 
                                return new THREE.CanvasTexture(cvs);
                            }

                            // 3. 更新几何体和材质
                            // 创建高细分火星几何体
                            const marsGeometry = new THREE.SphereGeometry(planet.radius, 128, 64);

                            // 创建高质量火星材质
                            material = new THREE.MeshStandardMaterial({
                                map: createMarsTexture(),
                                bumpMap: createMarsBumpMap(),
                                bumpScale: 0.5,
                                roughness: 0.9,
                                metalness: 0.05,
                                shininess: 5,
                                reflectivity: 0.15 // 火星稀薄大气的微弱反光
                            });
                            mesh.material = material;

                            // 4. 添加火星稀薄大气层
                            const atmosphereGeometry = new THREE.SphereGeometry(planet.radius * 1.05, 128, 64);
                            const atmosphereMaterial = new THREE.MeshBasicMaterial({
                                color: 0xd96638,
                                transparent: true,
                                opacity: 0.1,
                                side: THREE.BackSide,
                                depthWrite: false, // 防止大气层穿模
                                polygonOffset: true,
                                polygonOffsetFactor: -2,
                                polygonOffsetUnits: -2
                            });
                            const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
                            mesh.add(atmosphere);

                            // 保存材质引用以便动画更新
                            planet.atmosphereMaterial = atmosphereMaterial;
                        } else if (planet.name === '金星') {
                            // 高质量金星模型实现 - 基于jinjinjin.html
                            // 1. 创建金星表面纹理
                            function createVenusTexture() {
                                const cvs = document.createElement('canvas');
                                const size = 1024;
                                cvs.width = size;
                                cvs.height = size / 2;
                                const ctx = cvs.getContext('2d');
                                
                                // 金星基础色调 - 黄色到橙色渐变
                                const baseGradient = ctx.createLinearGradient(0, 0, 0, size/2);
                                baseGradient.addColorStop(0, '#ffb347');
                                baseGradient.addColorStop(1, '#e67e22');
                                ctx.fillStyle = baseGradient;
                                ctx.fillRect(0, 0, size, size / 2);
                                
                                // 添加云层结构
                                drawCloudLayers(ctx, size);
                                
                                // 添加大气扰动效果
                                addAtmosphericEffects(ctx, size);
                                
                                return new THREE.CanvasTexture(cvs);
                            }

                            // 绘制多层云层
                            function drawCloudLayers(ctx, size) {
                                // 上层薄云
                                for (let i = 0; i < 8; i++) {
                                    drawCloudLayer(ctx, size, 0.3, 0.6, i * 0.12);
                                }
                                
                                // 中层厚云
                                for (let i = 0; i < 5; i++) {
                                    drawCloudLayer(ctx, size, 0.6, 0.8, 0.3 + i * 0.14);
                                }
                                
                                // 下层深色云
                                for (let i = 0; i < 3; i++) {
                                    drawCloudLayer(ctx, size, 0.2, 0.4, 0.7 + i * 0.1);
                                }
                            }

                            // 绘制单个云层
                            function drawCloudLayer(ctx, size, minOpacity, maxOpacity, offset) {
                                const cloudCount = 15 + Math.random() * 10;
                                const opacity = minOpacity + Math.random() * (maxOpacity - minOpacity);
                                
                                for (let i = 0; i < cloudCount; i++) {
                                    const x = Math.random() * size;
                                    const y = (Math.random() * size * 0.3) + (size * 0.1) + (offset * size * 0.3);
                                    const width = 50 + Math.random() * 150;
                                    const height = 15 + Math.random() * 40;
                                    
                                    // 绘制不规则云形状
                                    ctx.beginPath();
                                    ctx.moveTo(x, y);
                                    
                                    // 上边缘波浪
                                    for (let j = 0; j < width; j += 10) {
                                        const wave = Math.sin(j * 0.1 + i) * 5 + (Math.random() * 8 - 4);
                                        ctx.lineTo(x + j, y + wave);
                                    }
                                    
                                    // 下边缘波浪
                                    for (let j = width; j >= 0; j -= 10) {
                                        const wave = Math.sin(j * 0.1 + i + 1) * 3 + (Math.random() * 5 - 2.5) + height;
                                        ctx.lineTo(x + j, y + wave);
                                    }
                                    
                                    ctx.closePath();
                                    
                                    // 云的渐变颜色
                                    const cloudColor = getCloudColor(opacity);
                                    ctx.fillStyle = cloudColor;
                                    ctx.fill();
                                }
                            }

                            // 获取云层颜色
                            function getCloudColor(opacity) {
                                // 根据透明度返回不同的云层颜色（从亮黄到橙棕）
                                const baseHue = 30; // 基础色调（黄色）
                                const hue = baseHue + (Math.random() * 15); // 轻微色调变化
                                const lightness = 60 + (Math.random() * 20); // 亮度变化
                                
                                return `hsla(${hue}, 80%, ${lightness}%, ${opacity})`;
                            }

                            // 添加大气扰动效果
                            function addAtmosphericEffects(ctx, size) {
                                // 大气漩涡
                                for (let i = 0; i < 5; i++) {
                                    const centerX = Math.random() * size;
                                    const centerY = Math.random() * size * 0.5;
                                    const radius = 40 + Math.random() * 80;
                                    
                                    drawVortex(ctx, centerX, centerY, radius);
                                }
                                
                                // 大气条纹
                                for (let i = 0; i < 10; i++) {
                                    drawAtmosphericBand(ctx, size, i * 0.1);
                                }
                            }

                            // 绘制大气漩涡
                            function drawVortex(ctx, x, y, r) {
                                const gradient = ctx.createRadialGradient(x, y, 0, x, y, r);
                                gradient.addColorStop(0, `hsla(35, 90%, 65%, ${0.1 + Math.random() * 0.15})`);
                                gradient.addColorStop(0.5, `hsla(25, 85%, 55%, ${0.05 + Math.random() * 0.1})`);
                                gradient.addColorStop(1, 'transparent');
                                
                                ctx.beginPath();
                                ctx.arc(x, y, r, 0, Math.PI * 2);
                                ctx.fillStyle = gradient;
                                ctx.fill();
                                
                                // 漩涡内部旋转线条
                                const segments = 12;
                                ctx.strokeStyle = `hsla(30, 80%, 60%, ${0.15})`;
                                ctx.lineWidth = 2;
                                
                                for (let i = 0; i < segments; i++) {
                                    const angle = (i / segments) * Math.PI * 2;
                                    const startR = r * 0.2;
                                    const endR = r * 0.9;
                                    
                                    const startX = x + Math.cos(angle) * startR;
                                    const startY = y + Math.sin(angle) * startR;
                                    const endX = x + Math.cos(angle + Math.PI + 0.3) * endR;
                                    const endY = y + Math.sin(angle + Math.PI + 0.3) * endR;
                                    
                                    ctx.beginPath();
                                    ctx.moveTo(startX, startY);
                                    ctx.quadraticCurveTo(
                                        x + Math.cos(angle + Math.PI/2) * (r * 0.5),
                                        y + Math.sin(angle + Math.PI/2) * (r * 0.5),
                                        endX, endY
                                    );
                                    ctx.stroke();
                                }
                            }

                            // 绘制大气条纹
                            function drawAtmosphericBand(ctx, size, offset) {
                                const yPos = offset * size * 0.5 + (Math.random() * 10 - 5);
                                const height = 15 + Math.random() * 30;
                                const opacity = 0.1 + Math.random() * 0.15;
                                
                                const gradient = ctx.createLinearGradient(0, yPos, 0, yPos + height);
                                gradient.addColorStop(0, `hsla(40, 85%, 60%, ${opacity * 0.5})`);
                                gradient.addColorStop(0.5, `hsla(30, 80%, 55%, ${opacity})`);
                                gradient.addColorStop(1, `hsla(40, 85%, 60%, ${opacity * 0.5})`);
                                
                                ctx.fillStyle = gradient;
                                ctx.fillRect(0, yPos, size, height);
                                
                                // 条纹中的扰动
                                for (let i = 0; i < 8; i++) {
                                    const x = Math.random() * size;
                                    const w = 20 + Math.random() * 60;
                                    const h = 5 + Math.random() * 15;
                                    const perturbY = yPos + (Math.random() * height) - h/2;
                                    
                                    ctx.fillStyle = `hsla(35, 90%, 65%, ${opacity * 0.7 + Math.random() * 0.2})`;
                                    ctx.fillRect(x, perturbY, w, h);
                                }
                            }

                            // 金星大气凹凸贴图
                            function createAtmosphereBumpMap() {
                                const cvs = document.createElement('canvas');
                                const size = 512;
                                cvs.width = size;
                                cvs.height = size / 2;
                                const ctx = cvs.getContext('2d');
                                
                                // 灰色基础
                                ctx.fillStyle = '#888';
                                ctx.fillRect(0, 0, size, size / 2);
                                
                                // 添加大气扰动效果
                                for (let i = 0; i < 1000; i++) {
                                    const x = Math.random() * size;
                                    const y = Math.random() * size / 2;
                                    const r = 1 + Math.random() * 4;
                                    
                                    // 随机生成大气扰动的明暗区域
                                    const value = 70 + Math.random() * 30;
                                    ctx.fillStyle = `rgb(${value}, ${value * 0.7}, ${value * 0.3})`;
                                    ctx.beginPath();
                                    ctx.arc(x, y, r, 0, Math.PI * 2);
                                    ctx.fill();
                                }
                                
                                // 添加大型气流区域
                                for (let i = 0; i < 5; i++) {
                                    const x = Math.random() * size;
                                    const y = Math.random() * size / 2;
                                    const r = 30 + Math.random() * 60;
                                    
                                    const gradient = ctx.createRadialGradient(x, y, 0, x, y, r);
                                    gradient.addColorStop(0, 'rgb(120, 80, 40)');
                                    gradient.addColorStop(1, 'rgb(80, 60, 30)');
                                    
                                    ctx.beginPath();
                                    ctx.arc(x, y, r, 0, Math.PI * 2);
                                    ctx.fillStyle = gradient;
                                    ctx.fill();
                                }
                                
                                return new THREE.CanvasTexture(cvs);
                            }

                            // 2. 更新几何体和材质
                            // 创建高细分金星几何体
                            const venusGeometry = new THREE.SphereGeometry(planet.radius, 128, 64);

                            // 创建高质量金星材质
                            material = new THREE.MeshStandardMaterial({
                                map: createVenusTexture(),
                                bumpMap: createAtmosphereBumpMap(),
                                bumpScale: 0.6,
                                roughness: 0.85,
                                metalness: 0.1,
                                shininess: 20,
                                reflectivity: 0.3 // 更高的反射率，体现浓密大气的反光
                            });
                            mesh.material = material;

                            // 3. 添加金星外层大气光晕
                            const atmosphereGeometry = new THREE.SphereGeometry(planet.radius * 1.08, 128, 64);
                            const atmosphereMaterial = new THREE.MeshBasicMaterial({
                                color: 0xffb347,
                                transparent: true,
                                opacity: 0.2,
                                side: THREE.BackSide,
                                depthWrite: false,
                                polygonOffset: true,
                                polygonOffsetFactor: -2,
                                polygonOffsetUnits: -2
                            });
                            const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
                            mesh.add(atmosphere);

                            // 保存材质引用以便动画更新
                            planet.atmosphereMaterial = atmosphereMaterial;

                        } else if (planet.name === '地球') {
                            // 高质量地球模型实现
                            // 1. 创建地球表面（使用外部纹理）
                            const loader = new THREE.TextureLoader();

                            // 地球表面纹理 (高分辨率)
                            const earthTexture = loader.load('https://cdn.jsdelivr.net/gh/mrdoob/three.js@dev/examples/textures/planets/earth_atmos_2048.jpg');
                            earthTexture.wrapS = earthTexture.wrapT = THREE.RepeatWrapping;
                            earthTexture.repeat.set(1, 1);
                            earthTexture.anisotropy = 16;

                            // 法线贴图 - 提供更精细的表面细节
                            const normalTexture = loader.load('https://cdn.jsdelivr.net/gh/mrdoob/three.js@dev/examples/textures/planets/earth_normal_2048.jpg');

                            // 高光贴图 - 控制水面和冰面的反射
                            const specularTexture = loader.load('https://cdn.jsdelivr.net/gh/mrdoob/three.js@dev/examples/textures/planets/earth_specular_2048.jpg');

                            // 创建地球几何体 (高细分度)
                            const earthGeometry = new THREE.SphereGeometry(planet.radius, 256, 256);
